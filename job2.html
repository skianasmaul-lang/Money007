<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job 2 - Quiz Game</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: #121212; color: #fff; padding-bottom: 80px; }
        .header { background: #1e1e1e; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #ffcc00; }
        .logo { font-size: 22px; font-weight: bold; color: #ffcc00; text-decoration: none; }
        .balance-box { background: #2a2a2a; padding: 8px 18px; border-radius: 20px; border: 1px solid #ffcc00; font-weight: bold; }
        
        .main-content { padding: 20px; max-width: 500px; margin: auto; }
        .job-header { display: flex; justify-content: space-between; font-size: 18px; color: #ffcc00; margin-bottom: 20px; font-weight: bold; }
        .task-box { background: #1e1e1e; padding: 25px 20px; border-radius: 15px; border: 1px solid #ffcc00; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .task-text { font-size: 18px; margin-bottom: 20px; font-weight: bold; color: #fff; line-height: 1.5; text-align: center; }
        .opt-btn { width: 100%; padding: 14px; background: #2a2a2a; border: 1px solid #333; color: #fff; border-radius: 10px; margin-bottom: 10px; font-size: 15px; text-align: left; cursor: pointer; transition: 0.2s; }
        .opt-btn:hover { border-color: #ffcc00; background: #333; }

        .bottom-nav { background: #1e1e1e; position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; padding: 12px 0; border-top: 2px solid #ffcc00; }
        .nav-item { color: #aaa; text-decoration: none; font-size: 12px; text-align: center; }
    </style>
</head>
<body>

<div class="header">
    <a href="home.html" class="logo">money 007</a>
    <div class="balance-box">৳ <span id="userBalance">0.00</span></div>
</div>

<div class="main-content">
    <div class="job-header">
        <span>Job 2: কুইজ খেলুন</span>
        <span id="taskCount">0/15</span>
    </div>
    
    <div class="task-box">
        <div class="task-text" id="quizQuestion">লোড হচ্ছে...</div>
        <div id="optionsContainer"></div>
    </div>
</div>

<div class="bottom-nav">
    <a href="home.html" class="nav-item">🏠<br>হোম</a>
    <a href="history.html" class="nav-item">📋<br>হিস্টরি</a>
    <a href="withdraw.html" class="nav-item">💰<br>উত্তোলন</a>
    <a href="refer.html" class="nav-item">👥<br>রেফার</a>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCyx_79aq2E4xTjH9v8IziuYVuoZd4jXk4",
        authDomain: "index-html-75ded.firebaseapp.com",
        databaseURL: "https://index-html-75ded-default-rtdb.firebaseio.com",
        projectId: "index-html-75ded",
        storageBucket: "index-html-75ded.firebasestorage.app",
        messagingSenderId: "833678381856",
        appId: "1:833678381856:web:ab7ae69f59539e79eabd45"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const userPhone = localStorage.getItem('loggedInUser');

    let currentBalance = 0, count = 0, correctCount = 0, currentCorrect = "";

    const quizData = [
        {q: "বাংলাদেশের জাতীয় ফুল কোনটি?", o: ["গোলাপ", "শাপলা", "জবা", "বেলী"], c: "শাপলা"},
        {q: "আইসিসি ক্রিকেট বিশ্বকাপ ২০২৩ কোন দেশে অনুষ্ঠিত হয়েছিল?", o: ["ভারত", "অস্ট্রেলিয়া", "ইংল্যান্ড", "বাংলাদেশ"], c: "ভারত"},
        {q: "কোন গ্রহকে লাল গ্রহ বলা হয়?", o: ["বুধ", "শুক্র", "মঙ্গল", "বৃহস্পতি"], c: "মঙ্গল"},
        {q: "পদ্মা সেতুর দৈর্ঘ্য কত কিলোমিটার?", o: ["৫.১৫ কিমি", "৬.১৫ কিমি", "৭.১৫ কিমি", "৬.৫০ কিমি"], c: "৬.১৫ কিমি"},
        {q: "বাংলাদেশের জাতীয় কবির নাম কি?", o: ["রবীন্দ্রনাথ ঠাকুর", "কাজী নজরুল ইসলাম", "জীবনানন্দ দাশ", "জসীমউদ্দীন"], c: "কাজী নজরুল ইসলাম"}
    ];

    db.ref('users/' + userPhone).on('value', (snapshot) => {
        if(snapshot.exists()) {
            currentBalance = snapshot.val().balance || 0;
            document.getElementById('userBalance').innerText = currentBalance.toFixed(2);
        }
    });

    function loadQuiz() {
        if(count >= 15) { completeJob(); return; }
        document.getElementById('taskCount').innerText = `${count}/15`;
        
        let randomQuiz = quizData[Math.floor(Math.random() * quizData.length)];
        currentCorrect = randomQuiz.c;
        
        document.getElementById('quizQuestion').innerText = randomQuiz.q;
        const container = document.getElementById('optionsContainer');
        container.innerHTML = "";
        
        randomQuiz.o.forEach(opt => {
            container.innerHTML += `<button class="opt-btn" onclick="verifyAns('${opt}')">🔹 ${opt}</button>`;
        });
    }
    loadQuiz();

    function verifyAns(selected) {
        if(selected === currentCorrect) {
            correctCount++;
            Swal.fire({icon:'success', title:'সঠিক!', timer:600, showConfirmButton:false});
        } else {
            Swal.fire({icon:'error', title:'ভুল উত্তর!', text:`সঠিক উত্তর ছিল: ${currentCorrect}`, timer:1000, showConfirmButton:false});
        }
        
        count++; // ভুল বা সঠিক যাই হোক, কাউন্ট ১ বাড়বে
        setTimeout(loadQuiz, 600);
    }

    function completeJob() {
        let baseReward = (correctCount / 15) * 1.0;
        let reward = parseFloat(Math.max(0.1, baseReward).toFixed(2));

        const updates = {};
        updates['users/' + userPhone + '/balance'] = currentBalance + reward;
        updates['users/' + userPhone + '/job2Time'] = Date.now();
        
        db.ref().update(updates).then(() => {
            db.ref('history/' + userPhone).push({
                type: "Job 2 (Quiz) Complete",
                amount: reward,
                date: new Date().toLocaleDateString()
            });
            
            Swal.fire({
                title: 'কুইজ রেজাল্ট!',
                html: `<div style="text-align:left; font-size:16px;">
                        <b>মোট প্রশ্ন:</b> ১৫টি<br>
                        <b style="color:green;">সঠিক উত্তর:</b> ${correctCount}টি<br>
                        <b style="color:red;">ভুল উত্তর:</b> ${15 - correctCount}টি<br><br>
                        <b style="color:#ffcc00; font-size:18px;">আপনার রিওয়ার্ড: ৳${reward}</b>
                       </div>`,
                icon: 'success',
                confirmButtonText: 'ড্যাশবোর্ডে ফিরুন'
            }).then(() => {
                window.location.href = 'home.html';
            });
        });
    }
</script>
</body>
</html>
