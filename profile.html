<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f4f6f9; font-family: sans-serif; }
        .green-bg { background-color: #3ca745; }
    </style>
</head>
<body class="max-w-md mx-auto bg-white min-h-screen flex flex-col justify-between shadow-xl pb-20">

    <div class="green-bg text-white px-4 pt-6 pb-6 rounded-b-[35px] shadow-md flex justify-between items-center">
        <div class="flex items-center gap-3">
            <img src="https://cdn-icons-png.flaticon.com/512/3177/3177440.png" class="w-12 h-12 rounded-full border-2 border-white bg-white">
            <div>
                <h2 id="profUser" class="font-bold text-lg">...</h2>
                <span class="text-xs opacity-80">Player Account</span>
            </div>
        </div>
        <button onclick="window.location.href='payment.html'" class="bg-emerald-800/50 px-4 py-2 rounded-full font-bold">৳ <span id="profBal">0.00</span> +</button>
    </div>

    <div class="p-4 flex-1 space-y-4">
        <div>
            <label class="text-xs font-bold text-gray-500 uppercase tracking-wider block mb-1">Username</label>
            <input id="uField" type="text" readonly class="w-full bg-gray-100 border p-3 rounded-xl text-gray-700 font-semibold outline-none">
        </div>

        <div>
            <label class="text-xs font-bold text-gray-500 uppercase tracking-wider block mb-1">Password (Click save icon to change)</label>
            <div class="relative">
                <input id="pField" type="text" class="w-full bg-white border p-3 pr-12 rounded-xl text-gray-800 font-semibold outline-none focus:border-emerald-500">
                <button onclick="updatePassword()" class="absolute right-3 top-3 text-emerald-600 text-xl hover:scale-110 transition-transform"><i class="fa-solid fa-floppy-disk"></i></button>
            </div>
        </div>

        <div class="border border-emerald-200 bg-emerald-50/50 rounded-2xl p-4 mt-2">
            <h4 class="text-emerald-800 font-bold flex items-center gap-2 text-sm"><i class="fa-solid fa-gift text-lg"></i> Invite & Earn Rewards</h4>
            <p class="text-xs text-gray-600 mt-1 leading-relaxed">আপনাদের বন্ধুদের আমন্ত্রণ জানান! একটি বন্ধুকে আমন্ত্রণ জানাতে পারলে এবং সে বন্ধু ফার্স্ট টাইম ডিপোজিট করলে সাথে সাথে আপনি পাবেন <span class="text-orange-600 font-bold">৳২০ বোনাস</span>।</p>
            
            <div class="bg-white border border-dashed border-emerald-400 rounded-xl p-3 mt-3 flex justify-between items-center">
                <span id="refLink" class="text-xs text-gray-600 font-mono select-all">money007.shop/?ref=...</span>
                <button onclick="copyRef()" class="text-emerald-600 hover:text-emerald-800"><i class="fa-solid fa-copy"></i></button>
            </div>
        </div>

        <div class="border rounded-2xl p-4 bg-white shadow-sm">
            <h4 class="text-gray-800 font-bold text-sm mb-2"><i class="fa-solid fa-user-group text-gray-500 mr-1"></i> Invited Friends List</h4>
            <div class="text-center py-4 bg-gray-50 rounded-xl border border-dashed text-xs text-gray-400">
                <span id="referCountLabel">এখনো কেউ আপনার লিংকে জয়েন করেনি!</span>
            </div>
        </div>

        <button onclick="logOut()" class="w-full bg-red-50 text-red-600 border border-red-200 font-bold py-3.5 rounded-xl shadow-sm hover:bg-red-100 transition flex items-center justify-center gap-2">
            <i class="fa-solid fa-arrow-right-from-bracket"></i> Logout From Account
        </button>
    </div>

    <div class="fixed bottom-0 max-w-md w-full bg-white border-t flex justify-around py-3 shadow-lg z-50">
        <button onclick="window.location.href='home.html'" class="text-gray-400 flex flex-col items-center"><i class="fa-solid fa-house text-xl"></i></button>
        <button onclick="window.location.href='wallet.html'" class="text-gray-400 flex flex-col items-center"><i class="fa-solid fa-wallet text-xl"></i></button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCyx_79aq2E4xTjH9v8IziuYVuoZd4jXk4",
            authDomain: "index-html-75ded.firebaseapp.com",
            databaseURL: "https://index-html-75ded-default-rtdb.firebaseio.com",
            projectId: "index-html-75ded",
            storageBucket: "index-html-75ded.firebasestorage.app",
            messagingSenderId: "833678381856",
            appId: "1:833678381856:web:ab7ae69f59539e79eabd45"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const currentUser = localStorage.getItem('currentUser');

        if(!currentUser) window.location.href = 'index.html';

        database.ref('users/' + currentUser).on('value', snapshot => {
            if(snapshot.exists()){
                const d = snapshot.val();
                document.getElementById('profUser').innerText = d.username;
                document.getElementById('profBal').innerText = parseFloat(d.balance).toFixed(2);
                document.getElementById('uField').value = d.username;
                document.getElementById('pField').value = d.password;
                document.getElementById('refLink').innerText = "money007.shop/?ref=" + d.username;
                
                if(d.referCount && d.referCount > 0) {
                    document.getElementById('referCountLabel').innerText = `মোট সফল রেফার সংখ্যা: ${d.referCount} জন`;
                    document.getElementById('referCountLabel').classList.remove('text-gray-400');
                    document.getElementById('referCountLabel').classList.add('text-emerald-700', 'font-bold');
                }
            }
        });

        function updatePassword() {
            const newPass = document.getElementById('pField').value.trim();
            if(!newPass) return alert("পাসওয়ার্ড খালি রাখা যাবে না!");
            database.ref('users/' + currentUser + '/password').set(newPass).then(() => {
                alert("পাসওয়ার্ড সফলভাবে আপডেট হয়েছে!");
            });
        }

        function copyRef() {
            const linkText = document.getElementById('refLink').innerText;
            navigator.clipboard.writeText(linkText);
            alert("রেফার লিংক কপি হয়েছে!");
        }

        function logOut() {
            localStorage.removeItem('currentUser');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
