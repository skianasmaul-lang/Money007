<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Money007 - Premium Profile</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: #121212; color: #fff; padding-bottom: 100px; }
        .header { background: #1e1e1e; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #ffcc00; }
        .logo { font-size: 22px; font-weight: bold; color: #ffcc00; text-decoration: none; }
        .balance-box { background: #2a2a2a; padding: 8px 18px; border-radius: 20px; border: 1px solid #ffcc00; font-weight: bold; }
        
        .main-content { padding: 25px 20px; max-width: 500px; margin: auto; text-align: center; }
        .avatar-box { width: 100px; height: 100px; background: #2a2a2a; border: 2px solid #ffcc00; border-radius: 50%; margin: 0 auto 15px; display: flex; justify-content: center; align-items: center; font-size: 40px; color: #ffcc00; overflow: hidden; position: relative; }
        .avatar-box img { width: 100%; height: 100%; object-fit: cover; }
        
        .user-phone { font-size: 20px; font-weight: bold; margin-bottom: 5px; color: #fff; }
        .user-uid { font-size: 13px; color: #ffcc00; margin-bottom: 25px; letter-spacing: 1px; }
        
        .info-card { background: #1e1e1e; border-radius: 12px; padding: 16px; margin-bottom: 15px; text-align: left; border-left: 4px solid #ffcc00; display: flex; justify-content: space-between; align-items: center; }
        .info-card span { font-size: 13px; color: #aaa; }
        .info-card strong { font-size: 16px; color: #fff; }
        
        /* Password Reset Section */
        .password-box { background: #1e1e1e; border-radius: 12px; padding: 16px; margin-bottom: 15px; text-align: left; border-left: 4px solid #3b82f6; }
        .password-box label { display: block; font-size: 13px; color: #aaa; margin-bottom: 8px; }
        .password-input-group { display: flex; gap: 10px; }
        .password-box input { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #333; background: #2a2a2a; color: #fff; font-size: 15px; }
        .password-box input:focus { border-color: #ffcc00; outline: none; }
        .btn-update { background: #3b82f6; color: #fff; border: none; padding: 0 15px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-update:hover { background: #2563eb; }

        /* Support Box */
        .support-card { background: #1a1a1a; border: 1px dashed #ffcc00; border-radius: 12px; padding: 15px; margin-bottom: 15px; text-align: left; display: flex; align-items: center; gap: 12px; }
        .support-icon { font-size: 24px; }
        .support-info a { color: #ffcc00; text-decoration: none; font-weight: bold; font-size: 14px; }
        
        /* Logout Button */
        .btn-logout { background: #ef4444; color: #fff; border: none; padding: 15px; width: 100%; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.2s; box-shadow: 0 4px 12px rgba(239, 68, 68, 0.2); }
        .btn-logout:hover { background: #dc2626; transform: translateY(-1px); }

        /* Bottom Nav */
        .bottom-nav { background: #1e1e1e; position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; padding: 12px 0; border-top: 2px solid #ffcc00; z-index: 100; }
        .nav-item { color: #aaa; text-decoration: none; font-size: 12px; text-align: center; }
        .nav-item.active { color: #ffcc00; font-weight: bold; }
    </style>
</head>
<body>

<div class="header">
    <a href="home.html" class="logo">money 007</a>
    <div class="balance-box">৳ <span id="userBalance">0.00</span></div>
</div>

<div class="main-content">
    <!-- Profile Picture Area -->
    <div class="avatar-box" id="avatarBox">👤</div>
    
    <div class="user-phone" id="profilePhone">01XXXXXXXXX</div>
    <div class="user-uid">রেফার কোড: <span id="profileReferCode">------</span></div>
    
    <!-- Profile Info Details -->
    <div class="info-card">
        <span>আমার মোট ব্যালেন্স</span>
        <strong style="color: #10b981;">৳ <span id="infoBalance">0.00</span></strong>
    </div>
    
    <div class="info-card">
        <span>অ্যাকাউন্ট খোলার তারিখ</span>
        <strong id="infoDate">--/--/----</strong>
    </div>

    <!-- 🔐 পাসওয়ার্ড রিসেট করার ফিচার (রিয়েল-টাইম) -->
    <div class="password-box">
        <label for="passInput">অ্যাকাউন্ট পাসওয়ার্ড (পরিবর্তন করতে পারেন)</label>
        <div class="password-input-group">
            <input type="text" id="passInput" placeholder="লোড হচ্ছে...">
            <button class="btn-update" onclick="updatePassword()">Update</button>
        </div>
    </div>

    <!-- ✉️ কাস্টমার সাপোর্ট সেকশন -->
    <div class="support-card">
        <div class="support-icon">✉️</div>
        <div class="support-info">
            <span style="display:block; font-size:12px; color:#aaa;">হেল্প ও কাস্টমার সাপোর্ট</span>
            <a href="mailto:skasmaulian@gmail.com">skasmaulian@gmail.com</a>
        </div>
    </div>

    <!-- 🚪 লগআউট বাটন -->
    <button class="btn-logout" onclick="handleLogout()">🚪 Log Out Account</button>
</div>

<div class="bottom-nav">
    <a href="home.html" class="nav-item">🏠<br>হোম</a>
    <a href="history.html" class="nav-item">📋<br>হিস্টরি</a>
    <a href="withdraw.html" class="nav-item">💰<br>উত্তোলন</a>
    <a href="refer.html" class="nav-item">👥<br>রেফার</a>
</div>

<script>
    // ফায়ারবেস কনফিগারেশন
    const firebaseConfig = {
        apiKey: "AIzaSyCyx_79aq2E4xTjH9v8IziuYVuoZd4jXk4",
        authDomain: "index-html-75ded.firebaseapp.com",
        databaseURL: "https://index-html-75ded-default-rtdb.firebaseio.com",
        projectId: "index-html-75ded",
        storageBucket: "index-html-75ded.firebasestorage.app",
        messagingSenderId: "833678381856",
        appId: "1:833678381856:web:ab7ae69f59539e79eabd45"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const userPhone = localStorage.getItem('loggedInUser');

    // ইউজার সেশন না থাকলে লগইন পেজে ব্যাক পাঠাবে
    if(!userPhone) { window.location.href = 'index.html'; }

    // রিয়েল-টাইম ডাটাবেস থেকে ডাটা লোড
    db.ref('users/' + userPhone).on('value', (snapshot) => {
        if(snapshot.exists()) {
            const userData = snapshot.val();
            
            // ডাটা রেন্ডারিং
            document.getElementById('userBalance').innerText = (userData.balance || 0).toFixed(2);
            document.getElementById('infoBalance').innerText = (userData.balance || 0).toFixed(2);
            document.getElementById('profilePhone').innerText = userData.phone;
            document.getElementById('profileReferCode').innerText = userData.referCode || 'N/A';
            document.getElementById('infoDate').innerText = userData.accountCreatedDate || 'N/A';
            
            // ইনপুট বক্সে রিয়েল-টাইম বর্তমান পাসওয়ার্ড দেখানো
            document.getElementById('passInput').value = userData.password || '';
            
            if(userData.profilePic) {
                document.getElementById('avatarBox').innerHTML = `<img src="${userData.profilePic}" alt="Profile">`;
            }
        }
    });

    // 🔐 পাসওয়ার্ড আপডেট করার লজিক
    function updatePassword() {
        const newPass = document.getElementById('passInput').value.trim();
        
        if(!newPass) {
            Swal.fire('দুঃখিত!', 'পাসওয়ার্ডের ঘরটি ফাঁকা রাখা যাবে না', 'error');
            return;
        }
        if(newPass.length >= 8) {
            Swal.fire('ভুল পাসওয়ার্ড!', 'পাসওয়ার্ড অবশ্যই ৮ অক্ষরের নিচে হতে হবে', 'error');
            return;
        }

        db.ref('users/' + userPhone).update({ password: newPass }).then(() => {
            Swal.fire('সফল আপডেট!', 'আপনার অ্যাকাউন্টের পাসওয়ার্ড পরিবর্তন করা হয়েছে।', 'success');
        }).catch((error) => {
            Swal.fire('কোথাও ভুল হয়েছে!', error.message, 'error');
        });
    }

    // 🚪 লগআউট ফাংশন
    function handleLogout() {
        Swal.fire({
            title: 'লগআউট করতে চান?',
            text: "লগআউট করলে পুনরায় পাসওয়ার্ড দিয়ে প্রবেশ করতে হবে!",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#ef4444',
            cancelButtonColor: '#2a2a2a',
            confirmButtonText: 'হ্যাঁ, লগআউট করুন',
            cancelButtonText: 'বাতিল'
        }).then((result) => {
            if (result.isConfirmed) {
                localStorage.removeItem('loggedInUser');
                window.location.href = 'index.html';
            }
        });
    }
</script>
</body>
</html>
