<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Money007 - Withdraw</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: #121212; color: #fff; padding-bottom: 90px; }
        .header { background: #1e1e1e; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #ffcc00; }
        .logo { font-size: 22px; font-weight: bold; color: #ffcc00; text-decoration: none; }
        .balance-box { background: #2a2a2a; padding: 8px 18px; border-radius: 20px; border: 1px solid #ffcc00; font-weight: bold; }
        
        .main-content { padding: 20px; max-width: 500px; margin: auto; }
        
        /* লাল রঙের ইম্পর্ট্যান্ট নোটিশ বোর্ড */
        .danger-notice { background: #7f1d1d; border: 2px solid #ef4444; padding: 15px; border-radius: 12px; margin-bottom: 20px; font-size: 14px; line-height: 1.6; text-align: center; color: #fca5a5; font-weight: bold; box-shadow: 0 4px 15px rgba(239, 68, 68, 0.2); }
        
        h2 { color: #ffcc00; margin-bottom: 20px; font-size: 22px; text-align: center; }
        .withdraw-card { background: #1e1e1e; padding: 25px 20px; border-radius: 15px; border: 1px solid #333; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label { display: block; font-size: 14px; color: #ffcc00; margin-bottom: 8px; }
        
        input { width: 100%; padding: 14px; background: #2a2a2a; border: 1px solid #444; color: #fff; border-radius: 8px; font-size: 16px; transition: 0.3s; }
        input:focus { border-color: #ffcc00; outline: none; }
        .fixed-method { background: #15803d; color: #fff; padding: 12px; border-radius: 8px; font-weight: bold; font-size: 16px; text-align: center; border: 1px solid #22c55e; }
        
        .btn-withdraw { background: #ffcc00; color: #000; border: none; padding: 15px; width: 100%; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 12px rgba(255, 204, 0, 0.2); }
        .btn-withdraw:hover { background: #e6b800; transform: translateY(-1px); }
        .btn-withdraw:disabled { background: #555; color: #aaa; cursor: not-allowed; }

        /* Bottom Nav */
        .bottom-nav { background: #1e1e1e; position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; padding: 12px 0; border-top: 2px solid #ffcc00; z-index: 100; }
        .nav-item { color: #aaa; text-decoration: none; font-size: 12px; text-align: center; }
        .nav-item.active { color: #ffcc00; font-weight: bold; }
    </style>
</head>
<body>

<div class="header">
    <a href="home.html" class="logo">money 007</a>
    <div class="balance-box">৳ <span id="userBalance">0.00</span></div>
</div>

<div class="main-content">
    
    <div class="danger-notice">
        ⚠️ বিশেষ সতর্কবার্তা:<br>
        উত্তোলন করলে মোট অ্যামাউন্ট থেকে ২০% উত্তোলন ফি কেটে নেওয়া হবে। আপনারা অবশ্যই আপনাদের সঠিক এবং পার্সোনাল নগদ (Nagad) নম্বরটি প্রদান করবেন।
    </div>

    <h2>টাকা উত্তোলন করুন</h2>
    
    <div class="withdraw-card">
        <div class="form-group">
            <label>পেমেন্ট মেথড (ডিফল্ট)</label>
            <div class="fixed-method">📱 নগদ (Nagad Personal)</div>
        </div>

        <div class="form-group">
            <label for="paymentNumber">আপনার নগদ পার্সোনাল নম্বর</label>
            <input type="tel" id="paymentNumber" placeholder="আপনার নগদ নম্বরটি লিখুন">
        </div>

        <div class="form-group">
            <label for="withdrawAmount">উত্তোলনের পরিমাণ (সর্বনিম্ন ২০০ ৳)</label>
            <input type="number" id="withdrawAmount" placeholder="সর্বনিম্ন ২০০ বা তার বেশি লিখুন">
        </div>

        <button class="btn-withdraw" id="subBtn" onclick="sendWithdrawRequest()">উত্তোলন রিকোয়েস্ট পাঠান</button>
    </div>
</div>

<div class="bottom-nav">
    <a href="home.html" class="nav-item">🏠<br>হোম</a>
    <a href="history.html" class="nav-item">📋<br>হিস্টরি</a>
    <a href="withdraw.html" class="nav-item active">💰<br>উত্তোলন</a>
    <a href="refer.html" class="nav-item">👥<br>রেফার</a>
</div>

<script>
    // ফায়ারবেস কনফিগারেশন
    const firebaseConfig = {
        apiKey: "AIzaSyCyx_79aq2E4xTjH9v8IziuYVuoZd4jXk4",
        authDomain: "index-html-75ded.firebaseapp.com",
        databaseURL: "https://index-html-75ded-default-rtdb.firebaseio.com",
        projectId: "index-html-75ded",
        storageBucket: "index-html-75ded.firebasestorage.app",
        messagingSenderId: "833678381856",
        appId: "1:833678381856:web:ab7ae69f59539e79eabd45"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const userPhone = localStorage.getItem('loggedInUser');

    if(!userPhone) { window.location.href = 'index.html'; }

    let currentBalance = 0;

    // মেইন ব্যালেন্স লাইভ রিড করা
    db.ref('users/' + userPhone).on('value', (snapshot) => {
        if(snapshot.exists()) {
            currentBalance = snapshot.val().balance || 0;
            document.getElementById('userBalance').innerText = currentBalance.toFixed(2);
        }
    });

    // উইথড্র রিকোয়েস্ট পাঠানোর ফাংশন
    function sendWithdrawRequest() {
        const paymentNumber = document.getElementById('paymentNumber').value.trim();
        const amountInput = document.getElementById('withdrawAmount').value.trim();
        const btn = document.getElementById('subBtn');

        if(!paymentNumber || !amountInput) {
            Swal.fire('দুঃখিত!', 'সবগুলো ঘর সঠিকভাবে পূরণ করুন।', 'error');
            return;
        }

        const amount = parseFloat(amountInput);

        // 🛑 শর্ত ১: সর্বনিম্ন ২০০ টাকা হতে হবে
        if(amount < 200) {
            Swal.fire('সীমা বহির্ভূত!', 'দুঃখিত, সর্বনিম্ন ২০০ টাকা উত্তোলন করতে হবে।', 'warning');
            return;
        }

        // 🛑 শর্ত ২: ব্যালেন্স চেক
        if(amount > currentBalance) {
            Swal.fire('পর্যাপ্ত ব্যালেন্স নেই!', `আপনার অ্যাকাউন্টে মাত্র ৳${currentBalance.toFixed(2)} আছে।`, 'error');
            return;
        }

        btn.innerText = "প্রসেসিং হচ্ছে...";
        btn.disabled = true;

        // ১. ইউজারের মূল ব্যালেন্স থেকে টাকা কেটে নেওয়া হচ্ছে
        const updatedBalance = currentBalance - amount;
        
        db.ref('users/' + userPhone).update({
            balance: updatedBalance
        }).then(() => {
            
            // ২. অ্যাডমিন প্যানেলের জন্য 'withdraws' নোডে রিয়েল-টাইম ডেটা পুশ (ফিক্সড মেথড: Nagad)
            const withdrawRef = db.ref('withdraws').push();
            
            withdrawRef.set({
                phone: userPhone,                  // ইউজারের মেইন অ্যাকাউন্ট
                paymentNumber: paymentNumber,      // নগদ পার্সোনাল নম্বর
                amount: amount,                    // মূল উত্তোলনের পরিমাণ
                method: "Nagad",                   // ফিক্সড নগদ মেথড
                status: "Pending",                 // এডমিনের জন্য প্রাথমিক অবস্থা
                time: new Date().toLocaleString()  // লাইভ তারিখ ও সময়
            }).then(() => {
                
                // ৩. ইউজারের ব্যক্তিগত হিস্ট্রিতে ডাটা সেভ করা
                db.ref('history/' + userPhone).push({
                    type: "উত্তোলন রিকোয়েস্ট (Nagad)",
                    amount: amount,
                    date: new Date().toLocaleDateString()
                });

                Swal.fire({
                    title: 'রিকোয়েস্ট সফল!',
                    text: `৳${amount} উত্তোলনের রিকোয়েস্ট অ্যাডমিনের কাছে পাঠানো হয়েছে।`,
                    icon: 'success',
                    confirmButtonText: 'ঠিক আছে'
                }).then(() => {
                    document.getElementById('paymentNumber').value = "";
                    document.getElementById('withdrawAmount').value = "";
                    btn.innerText = "উত্তোলন রিকোয়েস্ট পাঠান";
                    btn.disabled = false;
                });
            });

        }).catch((error) => {
            Swal.fire('ত্রুটি!', error.message, 'error');
            btn.innerText = "উত্তোলন রিকোয়েস্ট পাঠান";
            btn.disabled = false;
        });
    }
</script>
</body>
</html>
