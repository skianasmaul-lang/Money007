<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>User App</title>

<style>

body{
margin:0;
font-family:sans-serif;
background:#0f0f0f;
color:white;
}

.top{
display:flex;
justify-content:space-between;
padding:20px;
background:#151515;
align-items:center;
}

.balance{
background:#00c853;
padding:10px 18px;
border-radius:12px;
font-weight:bold;
}

.tasks{
padding:20px;
}

.task{
background:#1b1b1b;
padding:20px;
border-radius:20px;
margin-bottom:20px;
}

.btn{
padding:12px 20px;
border:none;
border-radius:12px;
background:#00c853;
color:white;
font-weight:bold;
margin-top:10px;
cursor:pointer;
}

input{
width:100%;
padding:12px;
margin-top:10px;
background:#111;
border:none;
border-radius:10px;
color:white;
}

</style>
</head>

<body>

<div class="top">

<div>
UID:
<span id="uid">0000</span>
</div>

<div class="balance">
$<span id="balance">0</span>
</div>

</div>

<div style="padding:20px;">
<button class="btn" id="googleLogin">
Continue With Google
</button>
</div>

<div class="tasks" id="tasks"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getDatabase,
ref,
set,
onValue,
push,
update,
get
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

import {
getAuth,
GoogleAuthProvider,
signInWithPopup,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {

apiKey: "AIzaSyDnwN7NCyF-qSm0Aa9m1FRi8t64VpxeXcA",
authDomain: "new-app-98e52.firebaseapp.com",
databaseURL: "https://new-app-98e52-default-rtdb.firebaseio.com",
projectId: "new-app-98e52",
storageBucket: "new-app-98e52.firebasestorage.app",
messagingSenderId: "402991418185",
appId: "1:402991418185:web:5dabc70d4404dce1902898",
measurementId: "G-BE3YXPV3P8"

};

const app = initializeApp(firebaseConfig);

const db = getDatabase(app);

const auth = getAuth(app);

const provider = new GoogleAuthProvider();

document.getElementById('googleLogin').onclick = async()=>{

await signInWithPopup(auth,provider);

}

onAuthStateChanged(auth,async(user)=>{

if(!user) return;

const userRef = ref(db,'users/'+user.uid);

const snap = await get(userRef);

if(!snap.exists()){

const allUsersSnap = await get(ref(db,'users'));

const total = allUsersSnap.exists()
? Object.keys(allUsersSnap.val()).length + 1
: 1;

const customUID = String(total).padStart(4,'0');

await set(userRef,{
email:user.email,
balance:0,
customUID,
suspended:false,
createdAt:Date.now()
});

}

loadUser(user.uid);

});

async function loadUser(uid){

onValue(ref(db,'users/'+uid),(snap)=>{

const user = snap.val();

document.getElementById('uid').innerText =
user.customUID;

document.getElementById('balance').innerText =
user.balance || 0;

if(user.suspended){

alert("Account Suspended");

auth.signOut();

}

});

onValue(ref(db,'tasks'),(snap)=>{

const data = snap.val() || {};

let html='';

Object.entries(data).forEach(([id,task])=>{

if(!task.status) return;

html += `
<div class="task">

<h3>${task.title}</h3>

<p>Reward: $${task.amount}</p>

<button class="btn"
onclick="startTask('${id}')">
Open Task
</button>

<div id="verify-${id}"></div>

</div>
`;

});

document.getElementById('tasks').innerHTML = html;

});

window.startTask = async(id)=>{

const taskSnap = await get(ref(db,'tasks/'+id));

const task = taskSnap.val();

window.open(task.jobLink);

setTimeout(()=>{

window.open(task.videoLink);

if(task.type==='youtube'){

document.getElementById(`verify-${id}`).innerHTML = `

<input type="text"
id="code-${id}"
placeholder="Enter Verify Code">

<button class="btn"
onclick="verifyTask('${id}')">
Verify
</button>

`;

}else{

completeTask(id);

}

},60000);

}

window.verifyTask = async(id)=>{

const taskSnap = await get(ref(db,'tasks/'+id));

const task = taskSnap.val();

const code = document.getElementById(`code-${id}`).value;

if(code !== task.code){

alert("Invalid Code");
return;

}

completeTask(id);

}

async function completeTask(id){

const currentUser = auth.currentUser;

const userRef = ref(db,'users/'+currentUser.uid);

const userSnap = await get(userRef);

const user = userSnap.val();

const taskSnap = await get(ref(db,'tasks/'+id));

const task = taskSnap.val();

await update(userRef,{
balance:(user.balance || 0) + parseFloat(task.amount)
});

alert("Reward Added");

}

}

</script>

</body>
</html>
