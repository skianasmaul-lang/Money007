<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: #f0f2f9; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: #333; }
        .phone-container { background: #ffffff; width: 100%; max-width: 410px; height: 840px; border-radius: 40px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); overflow: hidden; display: flex; flex-direction: column; position: relative; border: 8px solid #222; }
        .illustration-area { background: #eef0fa; height: 45%; display: flex; justify-content: center; align-items: center; position: relative; border-bottom-left-radius: 50px; border-bottom-right-radius: 50px; }
        .illustration-area svg { width: 70%; height: auto; }
        .form-area { padding: 40px 30px; flex: 1; display: flex; flex-direction: column; }
        .form-area h2 { color: #635bff; font-size: 32px; font-weight: 600; margin-bottom: 30px; }
        .input-group { position: relative; margin-bottom: 20px; }
        .input-group i { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); color: #a0a5ba; font-size: 18px; }
        .input-group input { width: 100%; padding: 16px 16px 16px 55px; border: 2px solid #eef0fa; border-radius: 30px; font-size: 15px; outline: none; transition: all 0.3s ease; background: #fcfcff; }
        .input-group input:focus { border-color: #635bff; background: #fff; box-shadow: 0 5px 15px rgba(99, 91, 255, 0.1); }
        .btn-login { background: #635bff; color: white; border: none; padding: 16px; border-radius: 30px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s ease; margin-top: 10px; box-shadow: 0 8px 20px rgba(99, 91, 255, 0.3); display: flex; justify-content: center; align-items: center; gap: 10px; }
        .btn-login:hover { background: #4b43d3; box-shadow: 0 8px 25px rgba(99, 91, 255, 0.4); transform: translateY(-1px); }
        .spinner { display: none; width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: #fff; animation: spin 1s ease-in-out infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .toast { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: #333; color: #fff; padding: 12px 25px; border-radius: 20px; font-size: 14px; opacity: 0; transition: all 0.4s ease; z-index: 10; white-space: nowrap; }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        .toast.error { background: #ff4a5a; }
        .toast.success { background: #2ecc71; }
    </style>
</head>
<body>

    <div class="phone-container">
        <div class="illustration-area">
            <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                <circle cx="100" cy="100" r="80" fill="#e2e5f8"/>
                <rect x="70" y="50" width="60" height="110" rx="10" fill="#ffffff" stroke="#635bff" stroke-width="4"/>
                <circle cx="100" cy="145" r="6" fill="#635bff"/>
                <path d="M85 75 H115 M85 90 H115 M85 105 H105" stroke="#e2e5f8" stroke-width="4" stroke-linecap="round"/>
                <circle cx="140" cy="100" r="12" fill="#635bff"/>
                <path d="M125 140 C125 115 155 115 155 140 Z" fill="#333"/>
            </svg>
        </div>

        <div class="form-area">
            <h2>Login</h2>
            <div class="input-group">
                <i class="fa-solid fa-phone"></i>
                <input type="tel" id="phoneNumber" placeholder="Phone Number" required>
            </div>
            <div class="input-group">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="password" placeholder="Password" required>
            </div>
            <button class="btn-login" id="loginBtn">
                <span class="spinner" id="spinner"></span>
                <span id="btnText">Sign In</span>
            </button>
        </div>
        <div class="toast" id="toast"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDCcEN0rhBMrPo8UK8RPXsnAkG7CPGSDDg",
            authDomain: "ludo-tournament-apps-45eb5.firebaseapp.com",
            databaseURL: "https://ludo-tournament-apps-45eb5-default-rtdb.firebaseio.com",
            projectId: "ludo-tournament-apps-45eb5",
            storageBucket: "ludo-tournament-apps-45eb5.firebasestorage.app",
            messagingSenderId: "1013047099500",
            appId: "1:1013047099500:web:a1c53f941f405c2f29d849",
            measurementId: "G-MZDSZ0CYKH"
        };

        // Initialize Firebase Compatibility Mode
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const phoneInput = document.getElementById('phoneNumber');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('loginBtn');
        const spinner = document.getElementById('spinner');
        const btnText = document.getElementById('btnText');
        const toast = document.getElementById('toast');

        // [মাস্টার ফিচার ২] অটো-লগইন সেশন ট্র্যাকার মেকানিজম 
        // ইউজার লগআউট না করা পর্যন্ত তাকে বারবার লগইন করার ঝামেলা পোহাতে হবে না।
        let cachedSessionPhone = localStorage.getItem('userPhone');
        if (cachedSessionPhone && cachedSessionPhone !== "null" && cachedSessionPhone !== "undefined") {
            // সেশন থাকলে ব্যাকএন্ড থেকে এক সেকেন্ডে ভেরিফাই করবে সে ব্যানড কিনা
            db.ref('users/' + cachedSessionPhone).once('value').then((snapshot) => {
                if(snapshot.exists()) {
                    const uData = snapshot.val();
                    if(uData.status === "Banned") {
                        localStorage.clear();
                        showToast("Your session has expired or account is banned!");
                    } else {
                        // যদি ব্যান না থাকে সরাসরি হোমপেজে চলে যাবে
                        window.location.replace("homepage.html");
                    }
                }
            });
        }

        function showToast(message, type = 'error') {
            toast.textContent = message;
            toast.className = `toast show ${type}`;
            setTimeout(() => { toast.classList.remove('show'); }, 3000);
        }

        loginBtn.addEventListener('click', async () => {
            const phone = phoneInput.value.trim();
            const password = passwordInput.value.trim();

            if (!phone || !password) {
                showToast("Please fill in all fields!");
                return;
            }

            // ফোন নাম্বার থেকে শুধুমাত্র সংখ্যা আলাদা করে পরিষ্কার করা
            const cleanPhone = phone.replace(/[^0-9]/g, "");
            
            if (cleanPhone.length < 10) {
                showToast("Please enter a valid phone number!");
                return;
            }

            loginBtn.disabled = true;
            spinner.style.display = "block";
            btnText.textContent = "Processing...";

            try {
                const userRef = db.ref('users/' + cleanPhone);
                
                userRef.once('value').then(async (snapshot) => {
                    if (snapshot.exists()) {
                        const userData = snapshot.val();
                        
                        // [মাস্টার ফিচার ১] ব্যান প্রটেকশন ভ্যালিডেশন লেয়ার
                        if (userData.status === "Banned") {
                            showToast("Your account has been banned!");
                            resetBtn();
                            return;
                        }

                        if (userData.password === password) {
                            localStorage.setItem('userPhone', cleanPhone); // সেশন সেভ করা
                            showToast("Login Successful!", "success");
                            setTimeout(() => { window.location.href = "homepage.html"; }, 1000);
                        } else {
                            showToast("Incorrect Password!");
                            resetBtn();
                        }
                    } else {
                        // ইউজার না থাকলে নতুন অ্যাকাউন্ট তৈরি ও ব্যালেন্স ডেমো সেট করা
                        const newUser = {
                            phone: cleanPhone,
                            password: password,
                            balance: 0.00,
                            status: "Active", // ডিফল্ট অ্যাক্টিভ স্ট্যাটাস জেনারেট
                            createdAt: Date.now() // প্রফেশনাল টাইমস্ট্যাম্প
                        };
                        
                        await userRef.set(newUser);
                        localStorage.setItem('userPhone', cleanPhone); // সেশন সেভ করা
                        showToast("Account Created successfully!", "success");
                        setTimeout(() => { window.location.href = "homepage.html"; }, 1000);
                    }
                }).catch((err) => {
                    console.error(err);
                    showToast("Database transmission layer error.");
                    resetBtn();
                });

            } catch (error) {
                console.error(error);
                showToast("Database connection failed.");
                resetBtn();
            }
        });

        function resetBtn() {
            loginBtn.disabled = false;
            spinner.style.display = "none";
            btnText.textContent = "Sign In";
        }
    </script>
</body>
</html>
