<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Viral Video Zone BD - Premium</title>
  <style>
    /* প্রিমিয়াম ডার্ক থিম ডিজাইন */
    body { 
      background-color: #0f0f11; 
      color: #ffffff; 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
      margin: 0; 
      padding: 15px; 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
    }
    
    /* ডার্ক সার্চ বার উইথ আইকন */
    .search-container {
      position: relative;
      width: 100%;
      max-width: 450px;
      margin-bottom: 15px;
    }
    .search-input {
      width: 100%;
      padding: 12px 40px 12px 15px; /* আইকনের জন্য ডানপাশে জায়গা রাখা হয়েছে */
      font-size: 15px;
      background-color: #1e1e24;
      color: #ffffff;
      border: 1px solid #333333;
      border-radius: 25px;
      outline: none;
      box-sizing: border-box;
      transition: all 0.3s ease;
    }
    .search-input::placeholder {
      color: #888888;
    }
    .search-input:focus {
      border-color: #8b5cf6; 
      box-shadow: 0 0 10px rgba(139, 92, 246, 0.2);
    }
    .search-icon {
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      width: 20px;
      height: 20px;
      fill: #8b5cf6; /* থিমের বেগুনি কালার */
      pointer-events: none; /* যাতে আইকনের উপর ক্লিক করলেও টাইপ করা যায় */
    }

    /* টপ ব্যানার অ্যাড স্লট */
    .ad-slot-top { 
      width: 100%; 
      max-width: 450px; 
      height: 120px; 
      background-color: #18181b; 
      border: 1px dashed #3f3f46; 
      margin-bottom: 20px; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      color: #71717a; 
      font-size: 14px; 
      border-radius: 12px;
    }
    
    /* পোস্টের মধ্যবর্তী নেটিভ অ্যাড স্লট */
    .ad-slot-native { 
      width: 100%; 
      max-width: 450px; 
      height: 90px; 
      background-color: #18181b; 
      border: 1px dashed #8b5cf6; 
      margin: 15px 0 25px 0; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      color: #8b5cf6; 
      font-size: 13px; 
      border-radius: 12px;
    }

    /* পোস্ট ফিড কন্টেইনার */
    #postsFeed {
      width: 100%;
      max-width: 450px;
    }

    /* প্রিমিয়াম ডার্ক পোস্ট কার্ড */
    .post-card { 
      width: 100%; 
      background: #18181b; 
      border-radius: 16px; 
      overflow: hidden; 
      margin-bottom: 15px;
    }
    
    .thumbnail-container {
      position: relative;
    }
    
    .post-thumb { 
      width: 100%; 
      aspect-ratio: 16/9; 
      background: #27272a; 
      object-fit: cover; 
      display: block;
      border-radius: 16px 16px 0 0;
    }

    /* ডিউরেশন ব্যাজ রিমুভ করা হয়েছে */

    .post-details { 
      padding: 16px 10px; 
      display: flex; 
      flex-direction: column; 
    }

    /* প্রোফাইল আইকন এবং টাইটেল এরিয়া */
    .header-area {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
    }
    
    .profile-icon {
      width: 38px;
      height: 38px;
      background-color: #8b5cf6;
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 18px;
      flex-shrink: 0;
    }

    .title-area {
      display: flex;
      flex-direction: column;
    }

    .post-title { 
      font-size: 15px; 
      font-weight: 600; 
      line-height: 1.4; 
      color: #ffffff;
      margin-bottom: 4px;
    }

    .post-meta {
      font-size: 12px;
      color: #a1a1aa;
    }
    
    .hurry-text {
      font-size: 13px;
      color: #a1a1aa;
      margin-top: 6px;
      margin-bottom: 12px;
      padding-left: 50px;
    }

    /* অ্যাকশন এরিয়া ও বেগুনি বাটন */
    .action-area { 
      display: flex; 
      gap: 12px;
      align-items: center; 
      padding-left: 50px; 
    }
    
    .btn-open { 
      flex: 1;
      background-color: #8b5cf6; 
      color: #ffffff; 
      border: none; 
      padding: 12px; 
      font-weight: bold; 
      cursor: pointer; 
      border-radius: 10px; 
      font-size: 13px; 
      letter-spacing: 0.5px;
      transition: background 0.2s ease;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .btn-open:hover { 
      background-color: #7c3aed; 
    }
    
    /* নতুন গোলাকার লাভ রিঅ্যাক্ট বাটন */
    .btn-love {
      background-color: #27272a;
      border: none;
      width: 44px;
      height: 44px;
      border-radius: 50%; /* পুরোপুরি গোল করা হয়েছে */
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-love:hover {
      background-color: #3f3f46;
    }
    
    .btn-love svg {
      width: 22px;
      height: 22px;
      fill: #ef4444; /* লাল কালারের লাভ আইকন */
    }

    .no-results {
      text-align: center;
      color: #71717a;
      margin-top: 30px;
      font-size: 15px;
    }
  </style>
</head>
<body>

  <div class="search-container">
    <input type="text" id="searchBar" class="search-input" placeholder="পছন্দের পোস্টটি সার্চ করুন...">
    <svg class="search-icon" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
  </div>

  <div class="ad-slot-top">
    [ব্যানার বিজ্ঞাপন বা সোশ্যাল বার অ্যাড এর জায়গা]
  </div>

  <div id="postsFeed">
    </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue, runTransaction } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCyx_79aq2E4xTjH9v8IziuYVuoZd4jXk4",
      authDomain: "index-html-75ded.firebaseapp.com",
      databaseURL: "https://index-html-75ded-default-rtdb.firebaseio.com",
      projectId: "index-html-75ded",
      storageBucket: "index-html-75ded.firebasestorage.app",
      messagingSenderId: "833678381856",
      appId: "1:833678381856:web:ab7ae69f59539e79eabd45",
      measurementId: "G-4704LVRXSH"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    
    let allPostsData = {}; 
    let clickState = {}; 
    const adLinks = [
      "https://www.effectivecpmnetwork.com/anxhyi1zr6?key=0b605acd320b08fc5acef493fca874cf",
      "https://www.effectivecpmnetwork.com/ehachkch?key=939d35191a845f7d758a129694267979",
      "https://www.effectivecpmnetwork.com/if62vkdup?key=3fd00c2ccc955b529cc17b5c4ec787eb"
    ];

    const analyticsRef = ref(db, 'analytics');
    runTransaction(analyticsRef, (currentData) => {
      if (currentData === null) {
        return { lifetime: 1, hourly: 1 };
      } else {
        currentData.lifetime = (currentData.lifetime || 0) + 1;
        currentData.hourly = (currentData.hourly || 0) + 1;
        return currentData;
      }
    });

    // ২. রিয়েল-টাইমে ডাটা আপডেট (সার্চ করা অবস্থাতেও লাইভ আপডেট কাজ করবে)
    onValue(ref(db, 'posts'), (snapshot) => {
      const posts = snapshot.val();
      if(posts) {
        allPostsData = posts; 
        
        // যদি ইউজার সার্চ করে থাকে, তবে সার্চ রেজাল্টেই আপডেট দেখাবে
        const searchQuery = document.getElementById('searchBar').value.toLowerCase().trim();
        if (searchQuery === "") {
          renderPosts(allPostsData);
        } else {
          const filteredPosts = {};
          const queryWords = searchQuery.split(/\s+/);
          Object.keys(allPostsData).forEach(key => {
            const title = allPostsData[key].title.toLowerCase();
            if(queryWords.some(word => title.includes(word))) {
              filteredPosts[key] = allPostsData[key];
            }
          });
          renderPosts(filteredPosts);
        }
      } else {
        document.getElementById('postsFeed').innerHTML = '<div class="no-results">কোনো পোস্ট পাওয়া যায়নি!</div>';
      }
    });

    // ৩. পোস্ট রেন্ডারিং ফাংশন
    function renderPosts(postsToRender) {
      const feedContainer = document.getElementById('postsFeed');
      feedContainer.innerHTML = ''; 

      const keys = Object.keys(postsToRender);
      
      keys.forEach((key) => {
        const post = postsToRender[key];
        
        if (clickState[key] === undefined) {
          clickState[key] = 0;
        }

        // ভিউজ ও লাভ ডাটা না থাকলে ডিফল্ট ০ দেখাবে
        const viewsCount = post.views || 0;
        const lovesCount = post.loves || 0;

        const cardHTML = `
          <div class="post-card">
            <div class="thumbnail-container">
              <img class="post-thumb" src="${post.thumbnail}" alt="Thumbnail">
              </div>
            
            <div class="post-details">
              <div class="header-area">
                <div class="profile-icon">V</div>
                <div class="title-area">
                  <div class="post-title">${post.title}</div>
                  <div class="post-meta">VIDEO CALL LINKS · <span id="views-${key}">${viewsCount}</span> views · ❤️<span id="loves-${key}">${lovesCount}</span></div>
                </div>
              </div>
              
              <div class="hurry-text">তাড়াতাড়ি দেখুন 👇</div>
              
              <div class="action-area">
                <button class="btn-open" onclick="handleOpenClick('${key}')">UNLOCK — <span id="clickCount-${key}">${clickState[key]}</span>/3 ADS</button>
                
                <button class="btn-love" onclick="handleLoveClick('${key}')">
                  <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"></path></svg>
                </button>
              </div>
            </div>
          </div>
          <div class="ad-slot-native">[সোশ্যাল বার বা নেটিভ ব্যানার অ্যাড এর স্পেস]</div>
        `;
        
        feedContainer.insertAdjacentHTML('beforeend', cardHTML);
      });
    }

    // স্মার্ট সার্চ 
    document.getElementById('searchBar').addEventListener('input', function(e) {
      const searchQuery = e.target.value.toLowerCase().trim();
      
      if(searchQuery === "") {
        renderPosts(allPostsData); 
        return;
      }

      const filteredPosts = {};
      const queryWords = searchQuery.split(/\s+/);

      Object.keys(allPostsData).forEach(key => {
        const title = allPostsData[key].title.toLowerCase();
        const isMatch = queryWords.some(word => title.includes(word));
        
        if(isMatch) {
          filteredPosts[key] = allPostsData[key];
        }
      });

      const totalFiltered = Object.keys(filteredPosts).length;
      if (totalFiltered > 0) {
        renderPosts(filteredPosts);
      } else {
        document.getElementById('postsFeed').innerHTML = '<div class="no-results">দুঃখিত, কোনো মিল পাওয়া যায়নি!</div>';
      }
    });

    // ৪. লাভ রিঅ্যাক্ট ক্লিক হ্যান্ডেলার (ফায়ারবেসে লাইভ সেভ হবে)
    window.handleLoveClick = function(postId) {
      const loveRef = ref(db, `posts/${postId}/loves`);
      runTransaction(loveRef, (currentLoves) => {
        return (currentLoves || 0) + 1;
      });
    };

    // ৫. আনলক বাটন এবং প্রথম ক্লিকে ভিউ কাউন্ট
    window.handleOpenClick = function(postId) {
      let currentClicks = clickState[postId];

      // প্রথমবার ক্লিক করলেই ডাটাবেজে ভিউ কাউন্ট +১ হয়ে যাবে
      if (currentClicks === 0) {
        const viewRef = ref(db, `posts/${postId}/views`);
        runTransaction(viewRef, (currentViews) => {
          return (currentViews || 0) + 1;
        });
      }

      if (currentClicks < 3) {
        window.open(adLinks[currentClicks], '_blank');
        
        clickState[postId]++;
        const clickSpan = document.getElementById(`clickCount-${postId}`);
        if(clickSpan) {
            clickSpan.innerText = clickState[postId];
        }
      } else {
        window.location.href = `Lobby.html?id=${postId}`;
      }
    }
  </script>
</body>
</html>
