<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium User Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0f1115;
            --card-dark: #1a1d24;
            --text-light: #f3f4f6;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --border-color: #2d3139;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
        }

        /* Login Screen */
        .login-screen {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, #1a1d24 0%, #0f1115 100%);
        }

        .btn-google {
            background: white;
            color: #333;
            padding: 15px 30px;
            border-radius: 30px;
            border: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(255,255,255,0.1);
            transition: 0.3s;
        }

        .btn-google:hover { transform: translateY(-2px); }

        /* Main Dashboard */
        .dashboard { display: none; padding: 20px; max-width: 600px; margin: 0 auto; padding-bottom: 80px;}

        /* Top Bar */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--card-dark);
            padding: 15px 20px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            margin-bottom: 20px;
        }

        .user-id-box { display: flex; align-items: center; gap: 8px; font-weight: bold;}
        .copy-btn { cursor: pointer; color: var(--accent-green); }

        .balance-box {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid var(--accent-green);
            padding: 8px 15px;
            border-radius: 20px;
            color: var(--accent-green);
            font-weight: 700;
        }

        /* Task List */
        .task-card {
            background: var(--card-dark);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
        }

        .task-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 15px;
        }

        .task-amount { color: var(--accent-green); font-weight: 700; font-size: 18px;}

        .task-actions { display: flex; gap: 10px; margin-bottom: 15px;}

        .btn-task {
            flex: 1; padding: 10px; border: none; border-radius: 6px;
            font-weight: 600; cursor: pointer; color: white; text-align: center; text-decoration: none;
        }
        .btn-link1 { background: #3b82f6; }
        .btn-link2 { background: #8b5cf6; opacity: 0.6; pointer-events: none;}

        /* Verification input */
        .verify-box { display: flex; gap: 10px; margin-top: 10px;}
        .verify-box input {
            flex: 1; background: #0f1115; border: 1px solid var(--border-color);
            padding: 10px; border-radius: 6px; color: white; text-align: center;
        }
        .btn-verify { background: var(--accent-green); color: white; border: none; padding: 0 15px; border-radius: 6px; cursor: pointer;}

        /* Bottom Nav */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: var(--card-dark); border-top: 1px solid var(--border-color);
            padding: 15px; display: flex; justify-content: center;
        }

        .btn-withdraw-trigger {
            background: var(--accent-red); color: white; border: none;
            padding: 10px 40px; border-radius: 20px; font-weight: 600; cursor: pointer;
        }

        /* Popup */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center;
            z-index: 1000; display: none;
        }

        .modal-content {
            background: var(--card-dark); padding: 30px; border-radius: 12px;
            width: 90%; max-width: 400px; border: 1px solid var(--border-color); position: relative;
        }

        .close-modal { position: absolute; top: 15px; right: 15px; cursor: pointer;}

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; color: #9ca3af; font-size: 14px;}
        .form-group input { width:100%; background:#0f1115; border:1px solid var(--border-color); padding:10px; border-radius:6px; color:white;}
        
        .btn-submit { width:100%; background:var(--accent-green); color:white; border:none; padding:12px; border-radius:6px; font-weight:600; cursor:pointer;}
    </style>
</head>
<body>

<div class="login-screen" id="loginScreen">
    <h1 style="margin-bottom: 20px; letter-spacing: 2px;">PREMIUM EARN</h1>
    <button class="btn-google" onclick="loginWithGoogle()">
        <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" alt="G" width="20">
        Continue With Google
    </button>
</div>

<div class="dashboard" id="dashboard">
    <div class="top-bar">
        <div class="user-id-box">
            ID: <span id="userUidStr">0000</span>
            <i class="far fa-copy copy-btn" onclick="copyUid()"></i>
        </div>
        <div class="balance-box" id="userBalance">$0.00</div>
    </div>

    <div id="tasksContainer">
        </div>

    <div class="bottom-nav">
        <button class="btn-withdraw-trigger" onclick="toggleWithdrawModal(true)"><i class="fas fa-wallet"></i> উত্তোলন (Withdraw)</button>
    </div>
</div>

<div class="modal" id="withdrawModal">
    <div class="modal-content">
        <i class="fas fa-times close-modal" onclick="toggleWithdrawModal(false)"></i>
        <h3 style="margin-bottom: 15px; color: var(--accent-red);">উইথড্র রিকোয়েস্ট (নগদ)</h3>
        <div class="form-group">
            <label>আপনার নগদ নাম্বারটি দিন</label>
            <input type="text" id="walletNumber" placeholder="017XXXXXXXX">
        </div>
        <div class="form-group">
            <label>অ্যামাউন্ট দিন (মিনিমাম ১০০ টাকা)</label>
            <input type="number" id="walletAmount" placeholder="100">
        </div>
        <button class="btn-submit" onclick="submitWithdraw()">সাবমিট করুন</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getDatabase, ref, set, update, onValue, get, runTransaction } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // Firebase Configurations
    const firebaseConfig = {
        apiKey: "AIzaSyDnwN7NCyF-qSm0Aa9m1FRi8t64VpxeXcA",
        authDomain: "new-app-98e52.firebaseapp.com",
        databaseURL: "https://new-app-98e52-default-rtdb.firebaseio.com",
        projectId: "new-app-98e52",
        storageBucket: "new-app-98e52.firebasestorage.app",
        messagingSenderId: "402991418185",
        appId: "1:402991418185:web:5dabc70d4404dce1902898",
        measurementId: "G-BE3YXPV3P8"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    const provider = new GoogleAuthProvider();

    let currentUserData = null;
    let authUser = null;

    // গুগল দিয়ে লগইন
    window.loginWithGoogle = function() {
        signInWithPopup(auth, provider).catch(error => alert("লগইন ব্যর্থ: " + error.message));
    }

    // অথেন্টিকেশন স্টেট ট্র্যাকিং ও ৪-ডিজিট সিরিয়াল আইডি জেনারেটর সিস্টেম
    onAuthStateChanged(auth, (user) => {
        if (user) {
            authUser = user;
            const userRef = ref(db, `users/${user.uid}`);
            
            get(userRef).then((snapshot) => {
                if (!snapshot.exists()) {
                    // নতুন ৪ অক্ষরের সিরিয়াল আইডি তৈরি প্রসেস ট্রানজেকশন দ্বারা
                    const globalCounterRef = ref(db, 'globalCounter');
                    runTransaction(globalCounterRef, (currentCount) => {
                        return (currentCount || 0) + 1;
                    }).then((result) => {
                        let serial = result.snapshot.val();
                        let uniqueIdStr = String(serial).padStart(4, '0'); // উদাঃ 0001, 0002

                        const newUserData = {
                            uidStr: uniqueIdStr,
                            email: user.email,
                            balance: 0.00,
                            createdAt: Date.now(),
                            isSuspended: false,
                            jobsDone: 0,
                            withdrawCount: 0
                        };

                        set(userRef, newUserData).then(() => {
                            initDashboard(user.uid);
                        });
                    });
                } else {
                    // অ্যাকাউন্ট আগে থেকেই থাকলে স্ট্যাটাস চেক
                    if(snapshot.val().isSuspended) {
                        alert("লগইন এরর: আপনার অ্যাকাউন্টটি এডমিন দ্বারা সাসপেন্ড করা হয়েছে!");
                        signOut(auth);
                        location.reload();
                    } else {
                        initDashboard(user.uid);
                    }
                }
            });
        } else {
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('dashboard').style.display = 'none';
        }
    });

    // ড্যাশবোর্ড সিঙ্ক এবং লাইভ লিসেনার
    function initDashboard(uid) {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';

        // ইউজার ইনফো লাইভ আপডেট শোনা
        onValue(ref(db, `users/${uid}`), (snapshot) => {
            currentUserData = snapshot.val();
            if(currentUserData) {
                if(currentUserData.isSuspended) {
                    alert("আপনার অ্যাকাউন্টটি সাসপেন্ড করা হয়েছে!");
                    signOut(auth);
                    location.reload();
                    return;
                }
                document.getElementById('userUidStr').innerText = currentUserData.uidStr;
                document.getElementById('userBalance').innerText = `$${parseFloat(currentUserData.balance).toFixed(2)}`;
            }
        });

        // লাইভ টাস্ক লোডার (শুধুমাত্র Active/Status=True জবগুলো দেখাবে)
        onValue(ref(db, 'jobs'), (snapshot) => {
            const container = document.getElementById('tasksContainer');
            container.innerHTML = "";
            if(snapshot.exists()) {
                snapshot.forEach(childSnap => {
                    let job = childSnap.val();
                    if(job.status === true) {
                        renderTaskCard(job);
                    }
                });
            }
        });
    }

    // টাস্ক কার্ড ইউজার ইন্টারফেস রেন্ডারিং ও টাইমার কন্ট্রোল
    function renderTaskCard(job) {
        const container = document.getElementById('tasksContainer');
        let taskHtml = "";

        if(job.category === 'youtube') {
            taskHtml = `
                <div class="task-card" id="card_${job.id}">
                    <div class="task-header">
                        <span><i class="fab fa-youtube" style="color:red;"></i> ইউটিউব ভিডিও ওয়াচ</span>
                        <span class="task-amount">$${job.amount}</span>
                    </div>
                    <div class="task-actions">
                        <button class="btn-task btn-link1" id="btn1_${job.id}" onclick="startTimer('${job.id}', '${job.jobLink}', 'youtube')">১ম লিংক ওপেন</button>
                        <button class="btn-task btn-link2" id="btn2_${job.id}" onclick="openSecondLink('${job.id}', '${job.videoLink}')">২য় ভিডিও লিংক</button>
                    </div>
                    <div class="verify-box">
                        <input type="text" id="input_${job.id}" placeholder="ভিডিও কোডটি দিন">
                        <button class="btn-verify" onclick="verifyYoutubeJob('${job.id}', '${job.code}', ${job.amount})">Verify</button>
                    </div>
                </div>
            `;
        } else {
            // অ্যাপ ইন্সটল এবং ওয়েবসাইট ভিজিট সিস্টেম
            let title = job.category === 'app' ? '<i class="fas fa-download"></i> অ্যাপ ইন্সটল টাস্ক' : '<i class="fas fa-globe"></i> ওয়েবসাইট ভিজিট টাস্ক';
            taskHtml = `
                <div class="task-card" id="card_${job.id}">
                    <div class="task-header">
                        <span>${title}</span>
                        <span class="task-amount">$${job.amount}</span>
                    </div>
                    <div class="task-actions">
                        <button class="btn-task btn-link1" id="btn1_${job.id}" onclick="startTimer('${job.id}', '${job.jobLink}', 'other')">১ম লিংক ওপেন (৬০ সে.)</button>
                        <button class="btn-task btn-link2" id="btn2_${job.id}" style="background:#ea580c;">২য় লিংক (৭০ সে.)</button>
                    </div>
                </div>
            `;
        }
        container.innerHTML += taskHtml;
    }

    // টাইমার ও অটো-ক্রেডিট লজিক
    window.startTimer = function(jobId, link, type) {
        window.open(link, '_blank');
        let btn1 = document.getElementById(`btn1_${jobId}`);
        let btn2 = document.getElementById(`btn2_${jobId}`);
        let count = 60;

        btn1.style.pointerEvents = "none";
        let timer = setInterval(() => {
            count--;
            btn1.innerText = `${count} সে. অপেক্ষা`;
            if(count <= 0) {
                clearInterval(timer);
                btn1.innerText = "সম্পন্ন";
                btn2.style.opacity = "1";
                btn2.style.pointerEvents = "auto";
                
                // যদি অ্যাপ/ওয়েবসাইট টাস্ক হয় তবে সরাসরি ২য় লিংকের প্রসেস হবে
                if(type === 'other') {
                    startSecondTimerAuto(jobId);
                }
            }
        }, 1000);
    }

    // ইউটিউব ২য় লিংক ক্লিক
    window.openSecondLink = function(jobId, videoLink) {
        window.open(videoLink, '_blank');
    }

    // অ্যাপ/ওয়েবসাইট এর জন্য ২য় টাইমার ও অটো টাকা যোগ হওয়ার সিস্টেম
    function startSecondTimerAuto(jobId) {
        let btn2 = document.getElementById(`btn2_${jobId}`);
        get(ref(db, `jobs/${jobId}`)).then(snap => {
            let job = snap.val();
            window.open(job.jobLink, '_blank'); // রি-ওপেন বা অন্য লিংক ব্রাউজ করার জন্য
            let count = 70;
            let timer = setInterval(() => {
                count--;
                btn2.innerText = `${count} সে. অপেক্ষা`;
                if(count <= 0) {
                    clearInterval(timer);
                    btn2.innerText = "টাকা যুক্ত হয়েছে";
                    btn2.style.pointerEvents = "none";
                    // অটো ব্যালেন্স এড করার রিয়েলটাইম ফাংশন
                    claimReward(job.amount);
                    document.getElementById(`card_${jobId}`).style.opacity = "0.4";
                }
            }, 1000);
        });
    }

    // ইউটিউব কোড ভেরিফিকেশন ক্ল্যাম প্রসেস
    window.verifyYoutubeJob = function(jobId, targetCode, amount) {
        const inputCode = document.getElementById(`input_${jobId}`).value.trim();
        if(inputCode === targetCode) {
            claimReward(amount);
            alert("সঠিক কোড! ব্যালেন্স যোগ হয়েছে।");
            document.getElementById(`card_${jobId}`).remove();
        } else {
            alert("ভুল ভেরিফিকেশন কোড! আবার চেষ্টা করুন।");
        }
    }

    // রিওয়ার্ড ব্যালেন্স ডেটাবেজে রিয়েলটাইম আপডেট করার কোর মেথড
    function claimReward(amount) {
        const userRef = ref(db, `users/${authUser.uid}`);
        let currentBal = parseFloat(currentUserData.balance || 0);
        let currentJobs = parseInt(currentUserData.jobsDone || 0);
        update(userRef, {
            balance: currentBal + parseFloat(amount),
            jobsDone: currentJobs + 1
        });
    }

    // ইউআইডি কপি ক্লিপবোর্ড
    window.copyUid = function() {
        navigator.clipboard.writeText(currentUserData.uidStr);
        alert("আইডি কপি হয়েছে: " + currentUserData.uidStr);
    }

    // উইথড্র ডায়ালগ বক্স কন্ট্রোল
    window.toggleWithdrawModal = function(show) {
        document.getElementById('withdrawModal').style.display = show ? 'flex' : 'none';
    }

    // রিয়েল টাইম উইথড্র সাবমিশন লজিক
    window.submitWithdraw = function() {
        const num = document.getElementById('walletNumber').value.trim();
        const amtBdt = parseFloat(document.getElementById('walletAmount').value) || 0;
        
        if(!num || amtBdt < 100) return alert("সঠিক নাম্বার এবং মিনিমাম ১০০ টাকা দিন");

        // ১ ডলার = ১০০ টাকা হিসাব করে ব্যালেন্স চেক (কনভার্সন রেট আপনার ইচ্ছা মত পরিবর্তন করতে পারেন)
        let neededUsd = amtBdt / 100; 

        if(parseFloat(currentUserData.balance) >= neededUsd) {
            // রিয়েল টাইমে ডাটাবেজ থেকে ডলার কেটে নেওয়া হচ্ছে
            const userRef = ref(db, `users/${authUser.uid}`);
            update(userRef, { balance: parseFloat(currentUserData.balance) - neededUsd });

            // রিকোয়েস্ট এডমিন প্যানেলে পাঠানো হচ্ছে
            const withdrawId = "wd_" + Date.now();
            const withdrawData = {
                id: withdrawId,
                userId: authUser.uid,
                userUidStr: currentUserData.uidStr,
                number: num,
                amount: amtBdt,
                method: "নগদ",
                status: "Pending"
            };

            set(ref(db, `withdraws/${withdrawId}`), withdrawData).then(() => {
                alert("উইথড্র রিকোয়েস্ট সফলভাবে এডমিন প্যানেলে পাঠানো হয়েছে!");
                toggleWithdrawModal(false);
            });
        } else {
            alert("ইনভ্যালিড অ্যামাউন্ট এরর: আপনার অ্যাকাউন্টে পর্যাপ্ত ব্যালেন্স নেই!");
        }
    }
</script>
</body>
</html>
