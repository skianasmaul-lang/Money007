<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { background-color: #121212; color: white; font-family: sans-serif; }
        .green-bg { background-color: #3ca745; }
    </style>
</head>
<body class="flex flex-col justify-between h-screen max-w-md mx-auto shadow-2xl relative">

    <div class="green-bg rounded-b-[40px] p-12 text-center shadow-lg">
        <h1 class="text-4xl font-bold tracking-wide">Sign In</h1>
    </div>

    <div class="px-8 flex-1 flex flex-col justify-center gap-4">
        <div>
            <input id="username" type="text" placeholder="Username" class="w-full p-4 bg-[#e0e0e0] text-black rounded-full outline-none text-lg placeholder-gray-600 font-medium">
        </div>
        <div>
            <input id="password" type="password" placeholder="Password" class="w-full p-4 bg-[#e0e0e0] text-black rounded-full outline-none text-lg placeholder-gray-600 font-medium">
        </div>

        <div class="text-center mt-2">
            <button onclick="showModal()" class="text-[#3ca745] font-semibold text-sm hover:underline">Forgot Username / Password?</button>
        </div>

        <button onclick="handleLogin()" class="w-full green-bg text-white font-bold py-4 rounded-full text-xl mt-4 shadow-md active:scale-95 transition-transform">SIGN IN</button>
    </div>

    <div class="h-6 bg-black w-full"></div>

    <div id="helpModal" class="hidden absolute inset-0 bg-black/80 flex items-center justify-center px-6 z-50">
        <div class="bg-[#1e1e1e] border border-gray-700 p-6 rounded-2xl w-full text-center relative">
            <button onclick="hideModal()" class="absolute top-3 right-3 text-gray-400 text-2xl font-bold">&times;</button>
            <h3 class="text-xl font-bold text-red-500 mb-2">Help & Support</h3>
            <p class="text-gray-300 text-sm mb-4">আপনার পাসওয়ার্ড বা অন্য কোনো সমস্যা হলে এই ইমেইলে সুন্দর করে লিখে পাঠান:</p>
            <a href="mailto:skianasmaul@gmail.com" class="text-emerald-400 font-mono block select-all font-semibold">skianasmaul@gmail.com</a>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCyx_79aq2E4xTjH9v8IziuYVuoZd4jXk4",
            authDomain: "index-html-75ded.firebaseapp.com",
            databaseURL: "https://index-html-75ded-default-rtdb.firebaseio.com",
            projectId: "index-html-75ded",
            storageBucket: "index-html-75ded.firebasestorage.app",
            messagingSenderId: "833678381856",
            appId: "1:833678381856:web:ab7ae69f59539e79eabd45"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function showModal() { document.getElementById('helpModal').classList.remove('hidden'); }
        function hideModal() { document.getElementById('helpModal').classList.add('hidden'); }

        function handleLogin() {
            const user = document.getElementById('username').value.trim().toLowerCase();
            const pass = document.getElementById('password').value.trim();

            if(!user || !pass) return alert("সব ঘর পূরণ করুন!");

            database.ref('users/' + user).once('value', snapshot => {
                if(snapshot.exists()) {
                    const userData = snapshot.val();
                    if(userData.banned) {
                        alert("আপনার অ্যাকাউন্টটি এডমিন দ্বারা ব্যান করা হয়েছে!");
                        return;
                    }
                    if(userData.password === pass) {
                        localStorage.setItem('currentUser', user);
                        window.location.href = 'home.html';
                    } else {
                        alert("ভুল পাসওয়ার্ড!");
                    }
                } else {
                    // Create Fresh Account
                    database.ref('users/' + user).set({
                        username: user,
                        password: pass,
                        balance: 0.00,
                        banned: false,
                        createdAt: new Date().toLocaleDateString(),
                        referCount: 0,
                        totalDeposit: 0,
                        totalWithdraw: 0
                    }).then(() => {
                        localStorage.setItem('currentUser', user);
                        window.location.href = 'home.html';
                    });
                }
            });
        }
    </script>
</body>
</html>
