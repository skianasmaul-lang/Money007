<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";

import {
    getDatabase,
    ref,
    get,
    set,
    onValue,
    update,
    push,
    runTransaction
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyDnwN7NCyF-qSm0Aa9m1FRi8t64VpxeXcA",
    authDomain: "new-app-98e52.firebaseapp.com",
    databaseURL: "https://new-app-98e52-default-rtdb.firebaseio.com",
    projectId: "new-app-98e52",
    storageBucket: "new-app-98e52.firebasestorage.app",
    messagingSenderId: "402991418185",
    appId: "1:402991418185:web:5dabc70d4404dce1902898",
    measurementId: "G-BE3YXPV3P8"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let currentUserPhone = null;
let isTaskRunning = false;

function getQueryParam(param) {
    const urlParams = new URLSearchParams(window.location.search);
    return urlParams.get(param);
}

window.handleAuth = async function () {

    const phone = document.getElementById("loginPhone").value.trim();

    if (phone.length !== 11 || !phone.startsWith("01")) {
        alert("সঠিক ফোন নাম্বার দিন");
        return;
    }

    currentUserPhone = phone;

    try {

        const userRef = ref(db, `users/${phone}`);
        const snapshot = await get(userRef);

        if (snapshot.exists()) {

            initUserRealtimeSession();

        } else {

            const uid = Math.floor(
                100000 + Math.random() * 900000
            ).toString();

            const refBy = getQueryParam("ref") || "";

            await set(userRef, {
                phone: phone,
                uid: uid,
                balance: 0,
                tasksCompleted: 0,
                referralCount: 0,
                referredBy: refBy,
                isBanned: false,
                createdAt: Date.now()
            });

            initUserRealtimeSession();
        }

    } catch (err) {
        console.log(err);
        alert("Firebase Error: " + err.message);
    }
};

function initUserRealtimeSession() {

    document.getElementById("loginPage").classList.add("hidden");
    document.getElementById("homePage").classList.remove("hidden");

    const userRef = ref(db, `users/${currentUserPhone}`);

    onValue(userRef, (snapshot) => {

        const user = snapshot.val();

        if (!user) return;

        if (user.isBanned) {
            alert("আপনার আইডি ব্যান করা হয়েছে");
            return;
        }

        document.getElementById("uBalance").innerText =
            Number(user.balance || 0).toFixed(2);

        document.getElementById("uTasksCount").innerText =
            `${user.tasksCompleted || 0} টি`;

        document.getElementById("uReferCount").innerText =
            `${user.referralCount || 0} জন`;

        document.getElementById("uUIDLabel").innerText =
            user.uid || "------";

        renderLogsHistory(user);
    });
}

function renderLogsHistory(user) {

    let html = "";

    if (user.withdraws) {

        Object.keys(user.withdraws).forEach(key => {

            const item = user.withdraws[key];

            html += `
            <div class="flex justify-between items-center bg-gray-50 p-2.5 rounded-xl border border-gray-100">
                <div>
                    <span class="font-bold block text-slate-800">
                        বিকাশ উইথড্র (৳${item.amount})
                    </span>
                </div>

                <span class="px-2 py-1 rounded bg-yellow-100 text-yellow-700 text-xs font-bold">
                    ${item.status}
                </span>
            </div>
            `;
        });
    }

    if (html === "") {
        html = `
        <p class="text-gray-400 text-center py-10">
            কোন হিস্ট্রি ডাটা এখনো তৈরি হয়নি
        </p>
        `;
    }

    document.getElementById("historyLogsContainer").innerHTML = html;
}

window.triggerTaskMining = function () {

    if (isTaskRunning) return;

    isTaskRunning = true;

    const btn = document.getElementById("startTaskBtn");
    const timer = document.getElementById("timerDisplay");

    btn.disabled = true;

    let timeLeft = 60;

    const interval = setInterval(async () => {

        timeLeft--;

        timer.innerText =
            `00:${timeLeft < 10 ? "0" + timeLeft : timeLeft}`;

        if (timeLeft <= 0) {

            clearInterval(interval);

            const balanceRef =
                ref(db, `users/${currentUserPhone}/balance`);

            const taskRef =
                ref(db, `users/${currentUserPhone}/tasksCompleted`);

            await runTransaction(balanceRef, (current) => {
                return (current || 0) + 0.01;
            });

            await runTransaction(taskRef, (current) => {
                return (current || 0) + 1;
            });

            timer.innerText = "00:00";

            btn.disabled = false;

            isTaskRunning = false;

            alert("টাস্ক সফল হয়েছে");
        }

    }, 1000);
};

window.openWithdrawModal = function () {
    document.getElementById("withdrawModal")
        .classList.remove("hidden");
};

window.closeWithdrawModal = function () {
    document.getElementById("withdrawModal")
        .classList.add("hidden");
};

window.submitWithdrawRequest = async function () {

    const bkash =
        document.getElementById("bkashNumber").value.trim();

    if (bkash.length !== 11) {
        alert("সঠিক বিকাশ নাম্বার দিন");
        return;
    }

    const userRef = ref(db, `users/${currentUserPhone}`);
    const snapshot = await get(userRef);

    const user = snapshot.val();

    if ((user.balance || 0) < 110) {
        alert("পর্যাপ্ত ব্যালেন্স নেই");
        return;
    }

    const withdrawRef =
        ref(db, `users/${currentUserPhone}/withdraws`);

    const newWithdraw = push(withdrawRef);

    await set(newWithdraw, {
        number: bkash,
        amount: 100,
        status: "pending",
        time: new Date().toLocaleString()
    });

    await update(userRef, {
        balance: (user.balance || 0) - 110
    });

    alert("Withdraw request sent");

    closeWithdrawModal();
};

window.copyReferralLink = function () {

    const uid =
        document.getElementById("uUIDLabel").innerText;

    const link =
        `${window.location.origin}${window.location.pathname}?ref=${uid}`;

    navigator.clipboard.writeText(link);

    alert("Referral link copied");
};

</script>
