<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Google Login & Timer</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            overflow: hidden;
        }

        /* Premium Glassmorphism Card */
        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px rgba(255, 255, 255, 0.1) solid;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            width: 90%;
            max-width: 400px;
            text-align: center;
            position: relative;
            transition: all 0.5s ease-in-out;
        }

        h2 {
            font-size: 28px;
            margin-bottom: 10px;
            font-weight: 700;
            letter-spacing: 1px;
            background: linear-gradient(45deg, #ff007f, #7f00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: #ccc;
            font-size: 14px;
            margin-bottom: 30px;
        }

        /* Buttons */
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .btn-google {
            background: #fff;
            color: #333;
            box-shadow: 0 4px 15px rgba(255,255,255,0.1);
        }

        .btn-google:hover {
            background: #f1f1f1;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255,255,255,0.2);
        }

        .btn-start {
            background: linear-gradient(45deg, #00c6ff, #0072ff);
            color: white;
            margin-top: 20px;
            box-shadow: 0 4px 15px rgba(0, 114, 255, 0.4);
        }

        .btn-start:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 114, 255, 0.6);
        }

        .btn-start.running {
            background: linear-gradient(45deg, #f857a6, #ff5858);
            box-shadow: 0 4px 15px rgba(255, 88, 88, 0.4);
        }

        /* Logout Button - Top Right */
        .logout-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: transparent;
            border: none;
            color: #ff4757;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: none;
            align-items: center;
            gap: 5px;
            transition: color 0.3s;
        }

        .logout-btn:hover {
            color: #ff6b81;
        }

        /* Profile Area */
        .profile-area {
            display: none;
            margin-bottom: 20px;
        }

        .profile-img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid #00c6ff;
            margin-bottom: 10px;
        }

        /* Timer Display */
        .timer-display {
            font-size: 36px;
            font-weight: 700;
            margin: 20px 0;
            font-family: monospace;
            background: linear-gradient(45deg, #00ffcc, #00c6ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: none;
        }

        /* UI States */
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="container">
        <button class="logout-btn" id="logoutBtn">
            <i class="fa-solid fa-right-from-bracket"></i> Logout
        </button>

        <div id="loginScreen">
            <h2>Welcome Back</h2>
            <p>Access your premium dashboard instantly</p>
            <button class="btn btn-google" id="googleLoginBtn">
                <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google" width="20">
                Continue with Google
            </button>
        </div>

        <div id="dashboardScreen" class="hidden">
            <div class="profile-area">
                <img src="" id="userPhoto" class="profile-img" alt="User">
                <h3 id="userName">User Name</h3>
            </div>
            
            <div class="timer-display" id="timerDisplay">00:00:00</div>
            
            <button class="btn btn-start" id="startBtn">
                <i class="fa-solid fa-play" id="startIcon"></i> <span id="startText">Start Timer</span>
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // আপনার প্রোভাইড করা ফায়ারবেস কনফিগারেশন
        const firebaseConfig = {
            apiKey: "AIzaSyDnwN7NCyF-qSm0Aa9m1FRi8t64VpxeXcA",
            authDomain: "new-app-98e52.firebaseapp.com",
            databaseURL: "https://new-app-98e52-default-rtdb.firebaseio.com",
            projectId: "new-app-98e52",
            storageBucket: "new-app-98e52.firebasestorage.app",
            messagingSenderId: "402991418185",
            appId: "1:402991418185:web:5dabc70d4404dce1902898",
            measurementId: "G-BE3YXPV3P8"
        };

        // Firebase ইনিশিয়েলাইজেশন
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        // DOM উপাদানসমূহ
        const loginScreen = document.getElementById('loginScreen');
        const dashboardScreen = document.getElementById('dashboardScreen');
        const googleLoginBtn = document.getElementById('googleLoginBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const userPhoto = document.getElementById('userPhoto');
        const userName = document.getElementById('userName');
        const timerDisplay = document.getElementById('timerDisplay');
        const startBtn = document.getElementById('startBtn');
        const startIcon = document.getElementById('startIcon');
        const startText = document.getElementById('startText');

        let timerInterval = null;
        let totalSeconds = 0;
        let isTimerRunning = false;
        let currentUser = null;

        // অথেনটিকেশন স্টেট পরিবর্তন চেক (ইউজার লগইন আছে কি না)
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                showDashboard(user);
                await loadUserTimerData(user.uid);
            } else {
                currentUser = null;
                resetTimerUI();
                showLogin();
            }
        });

        // গুগল লগইন ফাংশন
        googleLoginBtn.addEventListener('click', () => {
            signInWithPopup(auth, provider)
                .catch((error) => console.error("Login Failed: ", error));
        });

        // লগআউট ফাংশন
        logoutBtn.addEventListener('click', async () => {
            if (currentUser && isTimerRunning) {
                await saveTimerData(currentUser.uid, totalSeconds); // লগআউটের আগে টাইম সেভ হবে
            }
            signOut(auth).catch((error) => console.error("Logout Failed: ", error));
        });

        // টাইমার স্টার্ট/পজ বাটন কন্ট্রোল
        startBtn.addEventListener('click', async () => {
            if (!isTimerRunning) {
                startTimer();
            } else {
                await pauseTimer();
            }
        });

        // ড্যাশবোর্ড ভিউ দেখানো
        function showDashboard(user) {
            loginScreen.classList.add('hidden');
            dashboardScreen.classList.remove('hidden');
            logoutBtn.style.display = 'flex';
            
            userName.innerText = user.displayName;
            userPhoto.src = user.photoURL || 'https://via.placeholder.com/80';
            timerDisplay.style.display = 'block';
        }

        // লগইন ভিউ দেখানো
        function showLogin() {
            loginScreen.classList.remove('hidden');
            dashboardScreen.classList.add('hidden');
            logoutBtn.style.display = 'none';
        }

        // Firestore থেকে ওই জিমেইলের আগের টাইম ডাটা আনা
        async function loadUserTimerData(uid) {
            const docRef = doc(db, "users", uid);
            const docSnap = await getDoc(docRef);

            if (docSnap.exists()) {
                totalSeconds = docSnap.data().savedTime || 0;
            } else {
                totalSeconds = 0;
                await setDoc(docRef, { savedTime: 0, email: currentUser.email });
            }
            updateTimerDisplay();
        }

        // Firestore-এ বর্তমান টাইম ডাটা সেভ করা
        async function saveTimerData(uid, time) {
            const docRef = doc(db, "users", uid);
            await updateDoc(docRef, { savedTime: time });
        }

        // টাইমার চালু করা
        function startTimer() {
            isTimerRunning = true;
            startText.innerText = "Pause Timer";
            startIcon.className = "fa-solid fa-pause";
            startBtn.classList.add('running');

            timerInterval = setInterval(async () => {
                totalSeconds++;
                updateTimerDisplay();
                
                // প্রতি ৫ সেকেন্ড পর পর ব্যাকগ্রাউন্ডে স্বয়ংক্রিয়ভাবে ডাটাবেজে টাইম আপডেট হবে (নিরাপত্তার জন্য)
                if (totalSeconds % 5 === 0 && currentUser) {
                    saveTimerData(currentUser.uid, totalSeconds);
                }
            }, 1000);
        }

        // টাইমার পজ করা
        async function pauseTimer() {
            clearInterval(timerInterval);
            isTimerRunning = false;
            startText.innerText = "Start Timer";
            startIcon.className = "fa-solid fa-play";
            startBtn.classList.remove('running');
            
            if (currentUser) {
                await saveTimerData(currentUser.uid, totalSeconds);
            }
        }

        // টাইমার স্ক্রিন রিসেট
        function resetTimerUI() {
            clearInterval(timerInterval);
            isTimerRunning = false;
            totalSeconds = 0;
            updateTimerDisplay();
            startText.innerText = "Start Timer";
            startIcon.className = "fa-solid fa-play";
            startBtn.classList.remove('running');
        }

        // ফরম্যাট অনুযায়ী টাইম পর্দায় দেখানো (HH:MM:SS)
        function updateTimerDisplay() {
            const hrs = String(Math.floor(totalSeconds / 3600)).padStart(2, '0');
            const mins = String(Math.floor((totalSeconds % 3600) / 60)).padStart(2, '0');
            const secs = String(totalSeconds % 60).padStart(2, '0');
            timerDisplay.innerText = `${hrs}:${mins}:${secs}`;
        }
    </script>
</body>
</html>
