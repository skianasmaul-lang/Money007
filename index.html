;<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Modern Rewards</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #ffffff; color: #000000; font-family: 'Segoe UI', Roboto, sans-serif; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="pb-32 bg-white text-black min-h-screen flex flex-col">

    <nav class="bg-white border-b border-gray-100 px-6 py-4 sticky top-0 z-40 flex justify-between items-center shadow-sm">
        <div class="flex items-center gap-2">
            <div class="w-3 h-7 bg-green-500 rounded-full"></div>
            <span class="text-2xl font-black tracking-tight text-black">CASH<span class="text-green-600">NODE</span></span>
        </div>
        
        <div class="flex items-center gap-2 bg-gray-50 border border-gray-200 px-5 py-2.5 rounded-full shadow-inner">
            <i class="fa-solid fa-circle-dollar-to-slot text-green-600 text-lg"></i>
            <span id="userBalance" class="font-mono font-black text-xl text-black">$0.00</span>
        </div>
    </nav>

    <main class="max-w-3xl w-full mx-auto p-4 md:p-6 flex-1 flex flex-col justify-between">
        
        <div id="timerOverlay" class="hidden bg-red-50 border border-red-200 p-4 rounded-2xl items-center justify-between shadow-sm mb-6 animate-pulse">
            <span class="text-sm font-semibold text-red-700 flex items-center gap-2">
                <i class="fa-solid fa-circle-notch fa-spin text-red-500"></i> Job Link Active! Do not close the window...
            </span>
            <span id="countdownDisplay" class="font-mono font-black text-xl text-white bg-red-600 px-4 py-1.5 rounded-xl shadow-sm">60s</span>
        </div>

        <div class="flex-1">
            <div class="flex items-center justify-between border-b border-gray-100 pb-3 mb-6">
                <h3 class="text-xs font-bold uppercase tracking-widest text-gray-400 flex items-center gap-2">
                    <span class="w-1.5 h-1.5 bg-green-500 rounded-full animate-ping"></span> Live Earning Stream
                </h3>
                <span id="liveStatusDot" class="text-xs font-semibold text-red-500 bg-red-50 px-2.5 py-0.5 rounded-full hidden">Disconnected</span>
            </div>
            
            <div id="userTaskBox" class="space-y-4 custom-scroll overflow-y-auto max-h-[60vh] pr-1">
                <p class="text-center text-gray-400 text-sm py-16 font-medium">Please authenticating your access terminal at the bottom to view premium tasks.</p>
            </div>
        </div>
    </main>

    <div class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-md border-t border-gray-200 p-4 md:p-5 z-50 shadow-[0_-10px_30px_rgba(0,0,0,0.03)]">
        <div class="max-w-xl mx-auto flex items-center justify-between gap-4">
            
            <div class="flex items-center justify-center bg-gray-100 text-gray-700 w-12 h-12 rounded-xl border border-gray-200/60 shadow-sm transition-all" id="fingerprintBlock">
                <i class="fa-solid fa-fingerprint text-xl"></i>
            </div>

            <div class="flex-1 relative">
                <input id="pinInput" type="text" maxlength="6" placeholder="Enter 6-Digit PIN" class="w-full bg-gray-50 border border-gray-200 text-center text-lg font-mono font-bold tracking-[0.2em] rounded-xl py-3 px-4 text-black placeholder:tracking-normal placeholder:font-sans placeholder:text-sm placeholder:text-gray-400 focus:outline-none focus:border-green-500 focus:bg-white focus:ring-4 focus:ring-green-500/10 transition-all shadow-inner">
            </div>

            <button id="authBtn" onclick="handleAuth()" class="bg-green-600 hover:bg-green-700 text-white px-6 py-3.5 rounded-xl font-bold text-sm tracking-wide shadow-md shadow-green-600/10 transition-all whitespace-nowrap active:scale-95">
                Login / Join
            </button>
        </div>
        <div id="statusReport" class="text-center text-[10px] font-mono mt-2 text-gray-400 uppercase tracking-wider">Access Locked</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, get, update, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCvGMzJIZpW3S2gsXgAwFwqnjOA1Haiw5o",
            authDomain: "admin-panel-72a68.firebaseapp.com",
            databaseURL: "https://admin-panel-72a68-default-rtdb.firebaseio.com",
            projectId: "admin-panel-72a68",
            storageBucket: "admin-panel-72a68.firebasestorage.app",
            messagingSenderId: "274073022978",
            appId: "1:274073022978:web:2377937a2bf3132268ad1b",
            measurementId: "G-FKBVP0F4TR"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let activeUID = localStorage.getItem('user_uid') || null;

        if(activeUID) {
            document.getElementById('pinInput').value = activeUID;
            bindUserSession(activeUID);
        }

        window.handleAuth = async function() {
            if(activeUID) {
                // Terminate Secure Framework Session
                localStorage.removeItem('user_uid');
                activeUID = null;
                document.getElementById('pinInput').value = '';
                document.getElementById('pinInput').disabled = false;
                document.getElementById('authBtn').innerText = "Login / Join";
                document.getElementById('authBtn').className = "bg-green-600 hover:bg-green-700 text-white px-6 py-3.5 rounded-xl font-bold text-sm tracking-wide shadow-md shadow-green-600/10 transition-all whitespace-nowrap active:scale-95";
                document.getElementById('userBalance').innerText = "$0.00";
                document.getElementById('fingerprintBlock').className = "flex items-center justify-center bg-gray-100 text-gray-700 w-12 h-12 rounded-xl border border-gray-200/60 shadow-sm";
                document.getElementById('statusReport').className = "text-center text-[10px] font-mono mt-2 text-gray-400 uppercase tracking-wider";
                document.getElementById('statusReport').innerText = "Access Locked";
                document.getElementById('liveStatusDot').classList.add('hidden');
                setupTasksFeed();
                return;
            }

            const pin = document.getElementById('pinInput').value.trim();
            if(pin.length !== 6) { alert("PIN input syntax must match exactly 6 numeric keys."); return; }

            const userRef = ref(db, `users/${pin}`);
            const snapshot = await get(userRef);

            if(snapshot.exists()) {
                const data = snapshot.val();
                if(data.isBanned) {
                    alert("This secure cryptographic node channel has been permanently suspended by network root admin.");
                    return;
                }
            } else {
                // Initialize Account Blueprint Map Configuration
                await set(userRef, {
                    uid: pin,
                    balance: 0.00,
                    tasksCompleted: 0,
                    age: 1,
                    isBanned: false
                });
            }

            localStorage.setItem('user_uid', pin);
            activeUID = pin;
            bindUserSession(pin);
        };

        function bindUserSession(uid) {
            document.getElementById('pinInput').disabled = true;
            document.getElementById('authBtn').innerText = "Logout";
            document.getElementById('authBtn').className = "bg-red-600 hover:bg-red-700 text-white px-6 py-3.5 rounded-xl font-bold text-sm tracking-wide shadow-md shadow-red-600/10 transition-all whitespace-nowrap active:scale-95";
            document.getElementById('fingerprintBlock').className = "flex items-center justify-center bg-green-50 text-green-600 w-12 h-12 rounded-xl border border-green-200 shadow-sm";
            document.getElementById('liveStatusDot').classList.remove('hidden');

            // Listen to Balance & Variable Ecosystem Realtime
            onValue(ref(db, `users/${uid}`), (snapshot) => {
                if(snapshot.exists()) {
                    const data = snapshot.val();
                    if(data.isBanned) {
                        alert("Session terminated: Terminal connection blacklist alert flag intercepted.");
                        localStorage.removeItem('user_uid');
                        location.reload();
                        return;
                    }
                    document.getElementById('userBalance').innerText = `$${parseFloat(data.balance).toFixed(2)}`;
                    document.getElementById('statusReport').className = "text-center text-[10px] font-mono mt-2 text-green-600 font-bold uppercase tracking-wider";
                    document.getElementById('statusReport').innerText = `Active Link Node: ONLINE (${uid})`;
                }
            });
            setupTasksFeed();
        }

        function setupTasksFeed() {
            const container = document.getElementById('userTaskBox');
            if(!activeUID) {
                container.innerHTML = `<p class="text-center text-gray-400 text-sm py-16 font-medium">Please authenticating your access terminal at the bottom to view premium tasks.</p>`;
                return;
            }

            onValue(ref(db, 'tasks'), (snapshot) => {
                container.innerHTML = '';
                if(snapshot.exists()) {
                    const data = snapshot.val();
                    let itemsPresent = false;
                    Object.keys(data).forEach(key => {
                        const task = data[key];
                        if(task.hidden) return; 
                        itemsPresent = true;

                        // Premium High Density Expanded Task Cards Construction
                        const card = document.createElement('div');
                        card.className = "bg-white border border-gray-200 hover:border-gray-300 p-5 rounded-2xl flex justify-between items-center transition-all shadow-[0_4px_12px_rgba(0,0,0,0.01)] hover:shadow-[0_4px_20px_rgba(0,0,0,0.03)] group min-h-[90px]";
                        card.innerHTML = `
                            <div class="flex items-center gap-5 flex-1 min-w-0">
                                <div class="bg-green-50 text-green-600 font-mono font-black text-base md:text-lg px-4 py-2.5 rounded-xl border border-green-100 shrink-0 shadow-sm">
                                    $${parseFloat(task.amount).toFixed(2)}
                                </div>
                                <h4 class="text-base font-bold text-black truncate pr-4">${task.title}</h4>
                            </div>
                            <button onclick="launchTask('${task.link}', ${task.amount})" class="bg-green-600 hover:bg-green-700 text-white font-bold text-xs uppercase tracking-wider px-5 py-3 rounded-xl flex items-center gap-1.5 shadow-sm shadow-green-600/10 transition-all shrink-0 active:scale-95">
                                Open <i class="fa-solid fa-arrow-up-right-from-square text-[10px]"></i>
                            </button>
                        `;
                        container.appendChild(card);
                    });
                    if(!itemsPresent) container.innerHTML = `<p class="text-center text-gray-400 text-sm py-16 font-mono">No active streams deployed from root control node.</p>`;
                } else {
                    container.innerHTML = `<p class="text-center text-gray-400 text-sm py-16 font-mono">No active streams deployed from root control node.</p>`;
                }
            });
        }

        window.launchTask = function(url, amount) {
            if(!activeUID) return;
            window.open(url, '_blank');
            
            const overlay = document.getElementById('timerOverlay');
            const display = document.getElementById('countdownDisplay');
            overlay.classList.remove('hidden');
            overlay.classList.add('flex');

            let counter = 60;
            display.innerText = `${counter}s`;

            const sessionClock = setInterval(() => {
                counter--;
                display.innerText = `${counter}s`;
                if(counter <= 0) {
                    clearInterval(sessionClock);
                    overlay.classList.remove('flex');
                    overlay.classList.add('hidden');
                    
                    // Secure Balance Injection Payload Deployment 
                    const userRef = ref(db, `users/${activeUID}`);
                    get(userRef).then(snap => {
                        if(snap.exists()) {
                            let walletBal = parseFloat(snap.val().balance || 0);
                            let progressCount = parseInt(snap.val().tasksCompleted || 0);
                            update(userRef, {
                                balance: walletBal + amount,
                                tasksCompleted: progressCount + 1
                            });
                            alert(`Verification Success: +$${amount.toFixed(2)} synchronized to secure node balance.`);
                        }
                    });
                }
            }, 1000);
        }
    </script>
</body>
</html>
