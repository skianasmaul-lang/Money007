<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home - Premium Digital Products</title>
  <style>
    /* সম্পূর্ণ কালো ও থ্রিডি থিম */
    body { 
      background: #000000; 
      color: #ffffff; 
      font-family: 'Segoe UI', Roboto, sans-serif; 
      margin: 0; 
      padding: 15px; 
      padding-bottom: 80px; 
    }

    /* সার্চ কন্টেইনার এবং আইকন */
    .search-container {
      position: relative;
      width: 100%;
      margin-bottom: 25px;
    }
    
    .search-icon {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      width: 20px;
      height: 20px;
      fill: #ef4444; /* লাল আইকন */
      pointer-events: none;
    }

    /* থ্রিডি সার্চ বার */
    .search-bar { 
      width: 100%; 
      padding: 14px 14px 14px 45px; /* বামে স্পেস আইকনের জন্য */
      background: #0d0d0d; 
      border: 2px solid #ef4444; 
      color: white; 
      border-radius: 10px; 
      box-sizing: border-box; 
      font-size: 16px;
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.8), 0 4px 0 #b91c1c; 
      outline: none;
      transition: all 0.2s ease;
    }
    .search-bar:focus {
      transform: translateY(2px);
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.8), 0 2px 0 #b91c1c;
    }

    /* থ্রিডি পোস্ট কার্ড */
    .card { 
      background: #0d0d0d; 
      border: 1px solid #222;
      border-radius: 14px; 
      overflow: hidden; 
      margin-bottom: 25px; 
      box-shadow: 0 8px 0 #1a1a1a, 0 15px 20px rgba(0,0,0,0.7); 
      transform: translateY(0);
      transition: all 0.3s ease;
    }
    
    .card img { 
      width: 100%; 
      height: 220px; 
      object-fit: cover; 
      border-bottom: 2px solid #1a1a1a;
    }
    
    .card-content { padding: 18px; }
    
    .title-row { 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      margin-bottom: 15px; 
    }
    .title-row h4 { margin: 0; font-size: 18px; font-weight: 600; color: #ffffff; }
    .title-row small { color: #ef4444; font-weight: bold; font-size: 13px; }

    .action-row { 
      display: flex; 
      justify-content: space-between; 
      gap: 12px; 
    }

    /* থ্রিডি সবুজ আনলক বাটন */
    .btn { 
      background: #22c55e; 
      color: white; 
      padding: 14px; 
      border: none; 
      border-radius: 8px; 
      width: 80%; 
      cursor: pointer; 
      font-weight: bold; 
      font-size: 14px;
      text-transform: uppercase;
      box-shadow: 0 5px 0 #15803d; 
      transition: all 0.1s ease;
    }
    .btn:active {
      transform: translateY(4px);
      box-shadow: 0 1px 0 #15803d;
    }

    /* থ্রিডি লাল সেভ (বুকমার্ক) বাটন */
    .save-btn { 
      background: #ef4444; 
      width: 18%; 
      border: none; 
      border-radius: 8px; 
      color: white; 
      cursor: pointer; 
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 5px 0 #b91c1c; 
      transition: all 0.1s ease;
    }
    .save-btn:active {
      transform: translateY(4px);
      box-shadow: 0 1px 0 #b91c1c;
    }
    .save-btn svg {
      width: 20px;
      height: 20px;
      fill: white;
    }

    /* নেভিগেশন বার */
    .nav { 
      position: fixed; 
      bottom: 0; 
      left: 0; 
      width: 100%; 
      background: #0d0d0d; 
      display: flex; 
      padding: 15px 0; 
      justify-content: space-around; 
      border-top: 2px solid #ef4444; 
      box-shadow: 0 -5px 15px rgba(0,0,0,0.5);
      z-index: 100;
    }
    .nav a { color: white; text-decoration: none; font-weight: bold; font-size: 16px; transition: 0.2s; }
    .nav a.active { color: #22c55e; text-shadow: 0 0 10px rgba(34, 197, 94, 0.5); }
  </style>
</head>
<body>

  <div class="search-container">
    <svg class="search-icon" viewBox="0 0 24 24">
      <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
    </svg>
    <input type="text" id="search" class="search-bar" placeholder="Search platform products...">
  </div>
  
  <div id="feed"></div>

  <div class="nav">
    <a href="index.html" class="active">🏠 Home</a>
    <a href="save.html">🔖 Saved</a>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, update, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    // আপনার ফায়ারবেস কনফিগারেশন হুবহু রাখা হয়েছে
    const firebaseConfig = {
      apiKey: "AIzaSyCyx_79aq2E4xTjH9v8IziuYVuoZd4jXk4",
      authDomain: "index-html-75ded.firebaseapp.com",
      databaseURL: "https://index-html-75ded-default-rtdb.firebaseio.com",
      projectId: "index-html-75ded",
      storageBucket: "index-html-75ded.firebasestorage.app",
      messagingSenderId: "833678381856",
      appId: "1:833678381856:web:ab7ae69f59539e79eabd45",
      measurementId: "G-4704LVRXSH"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    
    let viewTimers = {};
    let countedInSession = new Set(); 

    const adLinks = [
      "https://www.effectivecpmnetwork.com/anxhyi1zr6?key=0b605acd320b08fc5acef493fca874cf",
      "https://www.effectivecpmnetwork.com/ehachkch?key=939d35191a845f7d758a129694267979",
      "https://www.effectivecpmnetwork.com/if62vkdup?key=3fd00c2ccc955b529cc17b5c4ec787eb"
    ];

    // Intersection Observer
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        const postId = entry.target.dataset.id;
        if (entry.isIntersecting) {
          if (!countedInSession.has(postId)) {
            viewTimers[postId] = setTimeout(() => {
              if (!countedInSession.has(postId)) { 
                update(ref(db, 'posts/' + postId), { views: increment(1) });
                countedInSession.add(postId); 
              }
            }, 2000);
          }
        } else {
          clearTimeout(viewTimers[postId]);
        }
      });
    }, { threshold: 0.6 });

    // ডাটাবেস থেকে রিয়েলটাইম পোস্ট লোড
    onValue(ref(db, 'posts'), (snapshot) => {
      const feed = document.getElementById('feed');
      feed.innerHTML = '';
      snapshot.forEach(child => {
        const data = child.val();
        const id = child.key;
        
        feed.innerHTML += `
          <div class="card" data-id="${id}" data-title="${data.title.toLowerCase()}">
            <img src="${data.img}" alt="Thumbnail">
            <div class="card-content">
              <div class="title-row">
                <h4>${data.title}</h4>
                <small>🔴 ${data.views} VIEWS</small>
              </div>
              <div class="action-row">
                <button class="btn" id="btn-${id}" onclick="handleAdClick('${id}')">UNLOCK — 0/3 ADS</button>
                <button class="save-btn" onclick="savePost('${id}', '${data.title}', '${data.img}')" title="Save Product">
                  <svg viewBox="0 0 24 24">
                    <path d="M17 3H7c-1.1 0-1.99.9-1.99 2L5 21l7-3 7 3V5c0-1.1-.9-2-2-2z"/>
                  </svg>
                </button>
              </div>
            </div>
          </div>
        `;
      });
      document.querySelectorAll('.card').forEach(card => observer.observe(card));
    });

    // সার্চ ফিল্টারিং
    document.getElementById('search').addEventListener('input', function(e) {
      const term = e.target.value.toLowerCase();
      document.querySelectorAll('.card').forEach(card => {
        card.style.display = card.dataset.title.includes(term) ? 'block' : 'none';
      });
    });

    // ৩-স্টেপ অ্যাড ক্লিক
    window.adClicks = {};
    window.handleAdClick = function(id) {
      if (!adClicks[id]) adClicks[id] = 0;
      const btn = document.getElementById('btn-' + id);
      
      if (adClicks[id] < 3) {
        window.open(adLinks[adClicks[id]], '_blank');
        adClicks[id]++;
        if (adClicks[id] < 3) {
          btn.innerText = `UNLOCK — ${adClicks[id]}/3 ADS`;
        } else {
          btn.innerText = "OPEN PRODUCT";
          btn.style.background = "#22c55e";
          btn.style.boxShadow = "0 5px 0 #15803d";
        }
      } else {
        window.location.href = `link.html?id=${id}`;
      }
    };

    // লোকাল স্টোরেজে পোস্ট সেভ
    window.savePost = function(id, title, img) {
      let saved = JSON.parse(localStorage.getItem('savedPosts')) || [];
      if (!saved.some(p => p.id === id)) {
        saved.push({ id, title, img });
        localStorage.setItem('savedPosts', JSON.stringify(saved));
        alert('Product saved to your list! 🎉');
      } else {
        alert('Already saved! Check your Saved tab.');
      }
    };
  </script>
</body>
</html>
