<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Login Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Background Animated Circles for Premium Look */
        body::before, body::after {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: linear-gradient(45deg, #4f46e5, #06b6d4);
            z-index: 1;
            opacity: 0.15;
            filter: blur(50px);
            animation: float 10s infinite alternate;
        }

        body::before { top: -50px; left: -50px; }
        body::after { bottom: -50px; right: -50px; animation-delay: 5s; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 50px) scale(1.2); }
        }

        /* Login Card Frame */
        .login-container {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            width: 100%;
            max-width: 450px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        h2 {
            color: #ffffff;
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        p.subtitle {
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 32px;
        }

        /* Input Styles */
        .input-group {
            position: relative;
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            color: #cbd5e1;
            font-size: 13px;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #ffffff;
            font-size: 15px;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            border-color: #fbbf24;
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 3px rgba(251, 191, 36, 0.15);
        }

        /* Premium Yellow Button */
        .btn-login {
            width: 100%;
            padding: 14px;
            background: #fbbf24;
            color: #0f172a;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(251, 191, 36, 0.2);
            margin-top: 10px;
        }

        .btn-login:hover {
            background: #f59e0b;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(251, 191, 36, 0.3);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        /* Links */
        .forgot-password {
            display: inline-block;
            margin-top: 16px;
            color: #94a3b8;
            font-size: 13px;
            text-decoration: none;
            transition: color 0.2s;
            cursor: pointer;
        }

        .forgot-password:hover {
            color: #fbbf24;
            text-decoration: underline;
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            margin: 24px 0;
            color: #475569;
            font-size: 12px;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
        }

        .divider span {
            padding: 0 10px;
        }

        /* Google Button */
        .btn-google {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #ffffff;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-google:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .btn-google svg {
            width: 20px;
            height: 20px;
        }

        /* Custom Modern Popup */
        .popup-modal {
            position: fixed;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid rgba(251, 191, 36, 0.4);
            backdrop-filter: blur(10px);
            padding: 16px 24px;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            z-index: 100;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0;
            max-width: 90%;
            width: 400px;
            text-align: center;
        }

        .popup-modal.show {
            top: 30px;
            opacity: 1;
        }

        .popup-content {
            color: #ffffff;
            font-size: 14px;
            line-height: 1.5;
        }

        .popup-email {
            color: #fbbf24;
            font-weight: 600;
            display: block;
            margin-top: 5px;
            font-size: 15px;
            word-break: break-all;
        }

        /* Loading Overlay */
        .loader {
            display: none;
            position: absolute;
            inset: 0;
            background: rgba(15, 23, 42, 0.7);
            border-radius: 24px;
            z-index: 11;
            justify-content: center;
            align-items: center;
            color: #fbbf24;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="popup-modal" id="forgotPopup">
        <div class="popup-content">
            পাসওয়ার্ড রিসেট করতে এই ইমেইল এড্রেসে যোগাযোগ করুন আপনার সমস্যাটি খুলে বলুন:
            <span class="popup-email">skianasmaul@gmail.com</span>
        </div>
    </div>

    <div class="login-container">
        <div class="loader" id="authLoader">Processing...</div>
        
        <h2>Welcome Back</h2>
        <p class="subtitle">Enter your premium credentials to access</p>

        <form id="loginForm" onsubmit="return false;">
            <div class="input-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="example@gmail.com" required autocomplete="username">
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
            </div>

            <button type="submit" class="btn-login" id="submitBtn">Login / Register</button>
        </form>

        <span class="forgot-password" id="forgotBtn">Forgot Password?</span>

        <div class="divider">
            <span>OR</span>
        </div>

        <button class="btn-google" id="googleBtn">
            <svg viewBox="0 0 24 24">
                <path fill="#EA4335" d="M12.24 10.285V14.4h6.887c-.275 1.565-1.88 4.604-6.887 4.604-4.33 0-7.866-3.577-7.866-8s3.536-8 7.866-8c2.46 0 4.105 1.025 5.047 1.926l3.227-3.11C18.281 1.045 15.45 0 12.24 0 5.48 0 0 5.373 0 12s5.48 12 12.24 12c7.06 0 11.75-4.918 11.75-11.957 0-.806-.088-1.42-.194-1.758H12.24z"/>
            </svg>
            Continue with Google
        </button>
    </div>

    <script type="module">
        // Firebase Modular Libraries via CDN
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Provided Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyCyx_79aq2E4xTjH9v8IziuYVuoZd4jXk4",
            authDomain: "index-html-75ded.firebaseapp.com",
            databaseURL: "https://index-html-75ded-default-rtdb.firebaseio.com",
            projectId: "index-html-75ded",
            storageBucket: "index-html-75ded.firebasestorage.app",
            messagingSenderId: "833678381856",
            appId: "1:833678381856:web:ab7ae69f59539e79eabd45",
            measurementId: "G-4704LVRXSH"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // DOM Elements
        const loginForm = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const forgotBtn = document.getElementById('forgotBtn');
        const forgotPopup = document.getElementById('forgotPopup');
        const googleBtn = document.getElementById('googleBtn');
        const loader = document.getElementById('authLoader');

        // 1. Forgot Password Popup Logic (3 Seconds Visibility)
        forgotBtn.addEventListener('click', () => {
            forgotPopup.classList.add('show');
            setTimeout(() => {
                forgotPopup.classList.remove('show');
            }, 3000);
        });

        // 2. Main Authentication Algorithm
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = emailInput.value.trim();
            const password = passwordInput.value;

            // Email Requirement Verification
            if (!email.endsWith('@gmail.com')) {
                alert("ইমেইলের শেষ অংশে অবশ্যই '@gmail.com' থাকতে হবে। এটি বাধ্যতামূলক।");
                return;
            }

            showLoader(true);

            try {
                // ১ম ধাপ: অ্যাকাউন্টে লগইন করার চেষ্টা করা হচ্ছে
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                // লগইন সফল হলে অ্যাডমিন প্যানেল চেক করবে
                await checkSuspensionAndRedirect(userCredential.user);
            } catch (signInError) {
                // যদি ইমেইল বা পাসওয়ার্ড সংক্রান্ত কোনো সমস্যা হয়
                const errorCode = signInError.code;
                
                if (errorCode === 'auth/invalid-credential' || errorCode === 'auth/user-not-found' || errorCode === 'auth/wrong-password') {
                    try {
                        // ২য় ধাপ: অ্যাকাউন্ট না থাকলে স্বয়ংক্রিয়ভাবে ফ্রেশ অ্যাকাউন্ট তৈরি (Register) করবে
                        const newAccCredential = await createUserWithEmailAndPassword(auth, email, password);
                        await checkSuspensionAndRedirect(newAccCredential.user);
                    } catch (signUpError) {
                        // যদি অ্যাকাউন্ট অলরেডি খোলা থাকে কিন্তু প্রথম ধাপে লগইন ফেইল হয়, তার মানে পাসওয়ার্ড ভুল ছিল
                        if (signUpError.code === 'auth/email-already-in-use') {
                            showLoader(false);
                            alert("পাসওয়ার্ড ভুল! লগইন আটকে দেওয়া হয়েছে।");
                        } else {
                            showLoader(false);
                            alert("ত্রুটি: " + signUpError.message);
                        }
                    }
                } else {
                    showLoader(false);
                    alert("লগইন ত্রুটি: " + signInError.message);
                }
            }
        });

        // 3. Continue With Google Authentication
        googleBtn.addEventListener('click', async () => {
            showLoader(true);
            const provider = new GoogleAuthProvider();
            try {
                const result = await signInWithPopup(auth, provider);
                await checkSuspensionAndRedirect(result.user);
            } catch (error) {
                showLoader(false);
                alert("গুগল লগইন ব্যর্থ হয়েছে: " + error.message);
            }
        });

        // 4. Admin Panel Backend Check (Banned/Suspended Status)
        async function checkSuspensionAndRedirect(user) {
            // রিয়েলটাইম ডাটাবেজে ইউজার স্ট্যাটাস চেক করা হচ্ছে (Path: users/uid/status)
            const userRef = ref(db, 'users/' + user.uid);
            try {
                const snapshot = await get(userRef);
                if (snapshot.exists()) {
                    const userData = snapshot.val();
                    // যদি অ্যাডমিন প্যানেল থেকে অ্যাকাউন্ট ব্যান বা সাসপেন্ড করা থাকে
                    if (userData.status === 'banned' || userData.status === 'suspended') {
                        showLoader(false);
                        alert("আপনার অ্যাকাউন্টটি অ্যাডমিন প্যানেল থেকে ব্যান বা সাসপেন্ড করা হয়েছে।");
                        return;
                    }
                }
                // সবকিছু ঠিক থাকলে home.html হাইপারলিংকে রিডাইরেক্ট করবে
                window.location.href = "home.html";
            } catch (dbError) {
                // ডাটাবেজ নোড সেটআপ করা না থাকলেও ফ্রেশ ইউজারদের সরাসরি লগইন অ্যাক্সেস দেবে
                window.location.href = "home.html";
            }
        }

        function showLoader(status) {
            loader.style.display = status ? 'flex' : 'none';
        }
    </script>
</body>
</html>
