        .balance-box { background: #2a2a2a; padding: 8px 15px; border-radius: 20px; border: 1px solid #ffcc00; font-weight: bold; }
        .profile-icon { width: 35px; height: 35px; background: #ffcc00; border-radius: 50%; display: flex; justify-content: center; align-items: center; color: #000; font-weight: bold; text-decoration: none;}

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCyx_79aq2E4xTjH9v8IziuYVuoZd4jXk4",
        authDomain: "index-html-75ded.firebaseapp.com",
        databaseURL: "https://index-html-75ded-default-rtdb.firebaseio.com",
        projectId: "index-html-75ded",
        storageBucket: "index-html-75ded.firebasestorage.app",
        messagingSenderId: "833678381856",
        appId: "1:833678381856:web:ab7ae69f59539e79eabd45"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const userPhone = localStorage.getItem('loggedInUser');

    onValue(ref(db, 'users/' + userPhone), (snapshot) => {
        if(snapshot.exists()) {
            document.getElementById('userBalance').innerText = (snapshot.val().balance || 0).toFixed(2);
        }
    });

    onValue(ref(db, 'history/' + userPhone), (snapshot) => {
        const listDiv = document.getElementById('historyList');
        if(snapshot.exists()) {
            listDiv.innerHTML = "";
            const data = snapshot.val();
            Object.keys(data).reverse().forEach(key => {
                const item = data[key];
                listDiv.innerHTML += `
                    <div class="hist-card">
                        <div class="hist-details">
                            <p>${item.type}</p>
                            <span>${item.date}</span>
                        </div>
                        <div class="hist-amount">+ ৳${item.amount}</div>
                    </div>
                `;
            });
        }
    });
</script>
