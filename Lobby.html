<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lobby</title>
  <style>
    body { background-color: #000; color: #fff; font-family: Arial, sans-serif; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
    
    /* Top Space for Ad */
    .ad-top-space { width: 100%; max-width: 450px; height: 80px; background: #111; border: 1px solid #333; margin-bottom: 30px; display: flex; align-items: center; justify-content: center; color: #555; }
    
    .btn-action { width: 100%; max-width: 350px; background-color: #00FF00; color: #000; border: none; padding: 15px; font-weight: bold; cursor: pointer; border-radius: 8px; font-size: 18px; margin: 12px 0; text-align: center; box-sizing: border-box; }
    .btn-action:disabled { background-color: #222; color: #555; cursor: not-allowed; border: 1px solid #333; }
    
    .timer-text { color: #ffcc00; font-size: 14px; margin-top: -5px; margin-bottom: 10px; }
    .warning-box { width: 100%; max-width: 350px; border: 1px solid #ff3333; background: #1a0000; color: #ff6666; padding: 15px; border-radius: 6px; text-align: center; font-size: 14px; margin-top: 30px; line-height: 1.4; }
  </style>
</head>
<body>

  <div class="ad-top-space">
    [ব্যানার বিজ্ঞাপন বা সোশ্যাল বার অ্যাড এর জায়গা]
  </div>

  <button id="btnVid1" class="btn-action" onclick="openLink('video1')">▶️ WATCH VIDEO 1</button>
  
  <button id="btnVid2" class="btn-action" disabled onclick="openLink('video2')">▶️ WATCH VIDEO 2</button>
  <div id="timer2" class="timer-text"></div>

  <button id="btnFinal" class="btn-action" style="background-color: #00FF00;" disabled onclick="openLink('jobLink')">🎯 GET FINAL LINK</button>
  <div id="timerFinal" class="timer-text"></div>

  <div class="warning-box">
    ⚠️ <strong>সতর্কতা:</strong> উপরের দুইটা চ্যানেল সাবস্ক্রাইব না করলে এবং সম্পূর্ণ ভিডিও না দেখলে ফাইনাল লিংকটি আনলক বা কাজ করবে না!
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCyx_79aq2E4xTjH9v8IziuYVuoZd4jXk4",
      authDomain: "index-html-75ded.firebaseapp.com",
      databaseURL: "https://index-html-75ded-default-rtdb.firebaseio.com",
      projectId: "index-html-75ded",
      storageBucket: "index-html-75ded.firebasestorage.app",
      messagingSenderId: "833678381856",
      appId: "1:833678381856:web:ab7ae69f59539e79eabd45",
      measurementId: "G-4704LVRXSH"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // URL থেকে নির্দিষ্ট পোস্ট আইডি রিসিভ করা 
    const urlParams = new URLSearchParams(window.location.search);
    const postId = urlParams.get('id');

    let postData = {};

    if(postId) {
      // রিয়েল-টাইমে উক্ত পোস্টের লিংক ডেটাবেজ থেকে নিয়ে আসা
      onValue(ref(db, 'posts/' + postId), (snapshot) => {
        postData = snapshot.val() || {};
      });
    }

    window.openLink = function(type) {
      const url = postData[type];
      if(url) {
        window.open(url, '_blank');
        
        // বাটন ১ এ ক্লিক করলে বাটন ২ এর ১০ সেকেন্ড টাইমার চালু হবে
        if(type === 'video1') {
          startTimer(10, 'timer2', 'btnVid2');
        } 
        // বাটন ২ এ ক্লিক করলে ফাইনাল বাটনের ১০ সেকেন্ড টাইমার চালু হবে
        else if(type === 'video2') {
          startTimer(10, 'timerFinal', 'btnFinal');
        }
      } else {
        alert('এডমিন এখনও এই লিংকটি যুক্ত করেনি!');
      }
    }

    // ১০ সেকেন্ড কাউন্টডাউন টাইমার ফাংশন
    function startTimer(seconds, timerId, buttonId) {
      let timeLeft = seconds;
      const timerElement = document.getElementById(timerId);
      
      const interval = setInterval(() => {
        timerElement.innerText = `দয়া করে ${timeLeft} সেকেন্ড অপেক্ষা করুন...`;
        timeLeft--;

        if (timeLeft < 0) {
          clearInterval(interval);
          timerElement.innerText = "";
          document.getElementById(buttonId).disabled = false;
        }
      }, 1000);
    }
  </script>
</body>
</html>
