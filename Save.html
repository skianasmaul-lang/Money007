<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Saved</title>
  <style>
    /* Index.html এর মতই একই স্টাইল */
    body { background: #0f0f13; color: white; font-family: sans-serif; margin: 0; padding: 10px; padding-bottom: 70px; }
    .share-box { background: #1a1a21; padding: 15px; border-radius: 10px; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
    .share-box input { flex: 1; padding: 10px; background: #0f0f13; border: 1px solid #d6205f; color: white; border-radius: 5px; }
    .copy-btn { background: #d6205f; border: none; padding: 10px 15px; color: white; border-radius: 5px; cursor: pointer; }
    
    .card { background: #1a1a21; border-radius: 10px; overflow: hidden; margin-bottom: 20px; }
    .card img { width: 100%; height: 250px; object-fit: cover; }
    .card-content { padding: 15px; }
    .btn { background: #d6205f; color: white; padding: 12px; border: none; border-radius: 8px; width: 100%; cursor: pointer; font-weight: bold; }
    .nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #1a1a21; display: flex; padding: 15px 0; justify-content: space-around; border-top: 1px solid #333; }
    .nav a { color: white; text-decoration: none; font-weight: bold; }
  </style>
</head>
<body>
  
  <div class="share-box">
    <span>Share:</span>
    <input type="text" id="shareLink" value="https://money007.shop/" readonly>
    <button class="copy-btn" onclick="copyLink()">Copy</button>
  </div>

  <h2>Saved Posts</h2>
  <div id="savedFeed"></div>

  <div class="nav">
    <a href="index.html">Home</a>
    <a href="save.html" style="color:#d6205f">Saved</a>
  </div>

  <script>
    // Copy Share Link
    function copyLink() {
      const link = document.getElementById('shareLink');
      link.select();
      document.execCommand('copy');
      alert('Link Copied! Share on WhatsApp, Telegram etc.');
    }

    // Load Saved Posts
    const saved = JSON.parse(localStorage.getItem('savedPosts')) || [];
    const feed = document.getElementById('savedFeed');
    
    if (saved.length === 0) {
      feed.innerHTML = "<p>No saved posts yet.</p>";
    } else {
      saved.forEach(data => {
        feed.innerHTML += `
          <div class="card">
            <img src="${data.img}" alt="Thumbnail">
            <div class="card-content">
              <h4>${data.title}</h4>
              <button class="btn" id="sbtn-${data.id}" onclick="handleAdClickSaved('${data.id}')">UNLOCK — 0/3 ADS</button>
            </div>
          </div>
        `;
      });
    }

    // Ad Click Logic (Same as index)
    const adLinks = [
      "https://www.effectivecpmnetwork.com/anxhyi1zr6?key=0b605acd320b08fc5acef493fca874cf",
      "https://www.effectivecpmnetwork.com/ehachkch?key=939d35191a845f7d758a129694267979",
      "https://www.effectivecpmnetwork.com/if62vkdup?key=3fd00c2ccc955b529cc17b5c4ec787eb"
    ];
    
    window.savedAdClicks = {};
    window.handleAdClickSaved = function(id) {
      if (!savedAdClicks[id]) savedAdClicks[id] = 0;
      const btn = document.getElementById('sbtn-' + id);
      
      if (savedAdClicks[id] < 3) {
        window.open(adLinks[savedAdClicks[id]], '_blank');
        savedAdClicks[id]++;
        if (savedAdClicks[id] < 3) {
          btn.innerText = `UNLOCK — ${savedAdClicks[id]}/3 ADS`;
        } else {
          btn.innerText = "OPEN";
          btn.style.background = "#4CAF50";
        }
      } else {
        window.location.href = `link.html?id=${id}`;
      }
    };
  </script>
</body>
</html>
