    <script>
        // Your web app's Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyDCcEN0rhBMrPo8UK8RPXsnAkG7CPGSDDg",
            authDomain: "ludo-tournament-apps-45eb5.firebaseapp.com",
            databaseURL: "https://ludo-tournament-apps-45eb5-default-rtdb.firebaseio.com",
            projectId: "ludo-tournament-apps-45eb5",
            storageBucket: "ludo-tournament-apps-45eb5.firebasestorage.app",
            messagingSenderId: "1013047099500",
            appId: "1:1013047099500:web:a1c53f941f405c2f29d849",
            measurementId: "G-MZDSZ0CYKH"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const balanceElement = document.getElementById('userBalance');

        // Fetch User login tracking data from localstorage
        let loggedInUserPhone = "";
        try {
            loggedInUserPhone = localStorage.getItem('userPhone');
        } catch(e) {}

        // Smart Fallback Engine: সেশন না থাকলেও প্রথম ইউজারের ব্যালেন্স লোড হবে
        if (!loggedInUserPhone || loggedInUserPhone === "null" || loggedInUserPhone === "undefined") {
            db.ref('users').limitToFirst(1).once('value', (snapshot) => {
                if (snapshot.exists()) {
                    snapshot.forEach((childSnapshot) => {
                        connectBalanceListener(childSnapshot.key);
                    });
                }
            });
        } else {
            connectBalanceListener(loggedInUserPhone);
        }

        // Real-time Balance Connection Engine
        function connectBalanceListener(phone) {
            const userBalanceRef = db.ref('users/' + phone);
            
            userBalanceRef.on('value', (snapshot) => {
                if (snapshot.exists()) {
                    const userData = snapshot.val();
                    const balance = userData.balance !== undefined ? userData.balance : 0.00;
                    balanceElement.textContent = "৳ " + parseFloat(balance).toFixed(2);
                } else {
                    balanceElement.textContent = "৳ 0.00";
                }
            }, (error) => {
                console.error("Data loading failed: ", error);
                balanceElement.textContent = "Error";
            });
        }
    </script>
