<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Invite & Earn</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: linear-gradient(135deg, #070a12 0%, #111428 100%); min-height: 100vh; color: #fff; padding-bottom: 90px; overflow: hidden; width: 100%; }
        
        /* Mobile-First Responsive Container */
        .app-container { width: 100%; max-width: 480px; margin: 0 auto; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }

        /* Premium Luxury Notice Card */
        .notice-card { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.06); border-radius: 24px; padding: 35px 25px; text-align: center; width: 100%; max-width: 400px; box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4); position: relative; overflow: hidden; }
        
        /* Soft glow effect behind card */
        .notice-card::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle, rgba(251, 191, 36, 0.05) 0%, transparent 70%); pointer-events: none; }

        /* Animated/Styled Icon Wrapper */
        .icon-wrapper { width: 70px; height: 70px; background: rgba(251, 191, 36, 0.1); border: 1px solid rgba(251, 191, 36, 0.3); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px auto; color: #fbbf24; box-shadow: 0 0 20px rgba(251, 191, 36, 0.1); }
        .icon-wrapper svg { width: 32px; height: 32px; fill: currentColor; }

        /* Typography */
        .notice-title { font-size: 18px; font-weight: 700; color: #fbbf24; margin-bottom: 12px; letter-spacing: 0.5px; text-transform: uppercase; }
        .notice-message { font-size: 14px; color: #cbd5e1; line-height: 1.6; font-weight: 400; margin-bottom: 20px; padding: 0 10px; }
        .notice-footer { font-size: 15px; font-weight: 600; color: #fbbf24; background: rgba(251, 191, 36, 0.08); display: inline-block; padding: 6px 20px; border-radius: 50px; border: 1px solid rgba(251, 191, 36, 0.15); }

        /* Bottom App Bar Navigation */
        .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; height: 65px; background: rgba(7, 10, 18, 0.95); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border-top: 1px solid rgba(255,255,255,0.06); display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #64748b; text-decoration: none; font-size: 10px; font-weight: 500; transition: 0.2s; }
        .nav-item.active { color: #fbbf24; }
        .nav-item svg { width: 20px; height: 20px; margin-bottom: 4px; fill: currentColor; }
        .nav-item:active { transform: scale(0.92); }
    </style>
</head>
<body>

    <div class="app-container">
        
        <div class="notice-card">
            <div class="icon-wrapper">
                <svg viewBox="0 0 24 24">
                    <path d="M20 2H4c-1.1 0-1.99.9-1.99 2L2 22l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-7 9h-2V5h2v6zm0 4h-2v-2h2v2z"/>
                </svg>
            </div>
            
            <div class="notice-title">Referral System</div>
            <div class="notice-message">
                আপাতত রেফার সিস্টেম বন্ধ আছে, কিছুদিনের ভিতরেই চালু হবে।
            </div>
            <div class="notice-footer">ধন্যবাদ!</div>
        </div>

        <div class="bottom-nav">
            <a href="home.html" class="nav-item">
                <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>Home
            </a>
            <a href="wallet.html" class="nav-item">
                <svg viewBox="0 0 24 24"><path d="M21 18v1c0 1.1-.9 2-2 2H5c-1.11 0-2-.9-2-2V5c0-1.1.89-2 2-2h14c1.1 0 2 .9 2 2v1h-9c-1.11 0-2 0-2 2v8c0 1.1.89 2 2 2h9zm-9-2h10V8H12v8zm4-2.5c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/></svg>Wallet
            </a>
            <a href="invite.html" class="nav-item active">
                <svg viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 1.34 5 3s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>Invite
            </a>
            <a href="profile.html" class="nav-item">
                <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.67-5-3-8-3z"/></svg>Account
            </a>
        </div>
        
    </div>

</body>
</html>
