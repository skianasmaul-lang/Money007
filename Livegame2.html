
<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High-Tech Arena - Livegame2</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0b0e14;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .phone-screen {
            width: 360px;
            height: 740px;
            background: linear-gradient(180deg, #0f1322 0%, #070911 100%);
            border-radius: 30px;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            position: relative;
            padding: 20px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Top Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .header h2 {
            font-size: 16px;
            font-weight: 600;
        }

        /* Profiles Scoreboard */
        .scoreboard {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 30px;
            position: relative;
        }

        .profile-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 15px;
            padding: 12px;
            width: 42%;
            text-align: center;
        }

        .profile-box p {
            font-size: 11px;
            color: #8fa0bc;
            margin-bottom: 4px;
        }

        .profile-box .name {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            background: rgba(0, 0, 0, 0.3);
            padding: 4px 8px;
            border-radius: 8px;
        }

        .vs-badge {
            width: 36px;
            height: 36px;
            background: #d91b5c;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 14px;
            box-shadow: 0 0 15px rgba(217, 27, 92, 0.4);
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
        }

        /* Gateway Status Loading */
        .gateway-status {
            background: rgba(212, 143, 56, 0.1);
            border: 1px solid #d48f38;
            color: #d48f38;
            padding: 10px;
            border-radius: 20px;
            text-align: center;
            font-size: 14px;
            margin: 25px 0;
            transition: all 0.3s ease;
        }

        .gateway-status.connected {
            background: rgba(40, 167, 69, 0.1);
            border: 1px solid #28a745;
            color: #28a745;
        }

        /* Game Arena (Black Box) */
        .game-arena {
            flex-grow: 1;
            background: #04060a;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.03);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
            color: #4a5568;
            position: relative;
        }

        /* Spin Controls */
        .controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 25px;
            margin-bottom: 15px;
        }

        .arrow-indicator {
            width: 0; 
            height: 0; 
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-top: 12px solid #28a745;
            margin-bottom: 10px;
            animation: bounce 1s infinite alternate;
        }

        .spin-btn {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: radial-gradient(circle, #232d42 0%, #151b29 100%);
            border: 4px solid #323f59;
            color: #8fa0bc;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            outline: none;
            box-shadow: 0 6px 15px rgba(0,0,0,0.5);
            transition: all 0.2s;
        }

        .spin-btn:active {
            transform: scale(0.95);
            background: #1d2638;
        }

        .spin-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(5px); }
        }
    </style>
</head>
<body>

<div class="phone-screen">
    <div class="header">
        <h2>High-Tech Arena - Livegame2</h2>
        <div style="font-size: 18px; cursor: pointer;">⋮</div>
    </div>

    <div class="scoreboard">
        <div class="profile-box">
            <p>আমার প্রোফাইল</p>
            <div class="name" id="my-name">আমি</div>
            <div class="stats">
                <span>চাল: <b id="my-moves">0/10</b></span>
                <span>স্কোর: <b id="my-score">0</b></span>
            </div>
        </div>

        <div class="vs-badge">VS</div>

        <div class="profile-box">
            <p>অপোনেন্ট প্রোফাইল</p>
            <div class="name" id="opp-name">লোডিং...</div>
            <div class="stats">
                <span>স্কোর: <b id="opp-score">0</b></span>
                <span>চাল: <b id="opp-moves">0/10</b></span>
            </div>
        </div>
    </div>

    <div class="gateway-status" id="status-banner">
        গেটওয়ে কানেক্ট করা হচ্ছে...
    </div>

    <div class="game-arena" id="arena-display">
        কানেকশনের জন্য অপেক্ষা করুন...
    </div>

    <div class="controls">
        <div class="arrow-indicator"></div>
        <button class="spin-btn" id="spin-button" disabled>SPIN</button>
    </div>
</div>

<script>
    // --- সকেট সার্ভার কনফিগারেশন ---
    // আপনার লাইভ ব্যাকএন্ড নোড/সকেট সার্ভারের URL এখানে বসাবেন। 
    // লোকালহোস্টে টেস্ট করার জন্য 'http://localhost:3000' দিতে পারেন।
    const SERVER_URL = "https://your-live-game-server.com"; 
    
    const socket = io(SERVER_URL, {
        autoConnect: true,
        transports: ['websocket', 'polling']
    });

    // DOM Elements
    const statusBanner = document.getElementById('status-banner');
    const oppNameDisplay = document.getElementById('opp-name');
    const arenaDisplay = document.getElementById('arena-display');
    const spinButton = document.getElementById('spin-button');

    // ১. সার্ভারের সাথে সকেট কানেক্ট হলে
    socket.on('connect', () => {
        console.log('Connected to server Gateway. ID:', socket.id);
        statusBanner.innerText = "সার্ভারে কানেক্টেড! ম্যাচ খোঁজা হচ্ছে...";
        
        // ম্যাচমেকিং রুমে যোগ দেওয়ার জন্য রিকোয়েস্ট পাঠানো
        socket.emit('join_arena', { username: 'আমি' });
    });

    // ২. ম্যাচমেকিং সফল হলে এবং অপোনেন্ট পাওয়া গেলে (গেটওয়ে সলভ)
    socket.on('match_found', (data) => {
        // data এর মধ্যে থাকবে রুম আইডি এবং অপোনেন্টের নাম
        console.log('Match Found in Room:', data.roomId);
        
        // UI আপডেট: গেটওয়ে লেখা চেঞ্জ হবে এবং অপোনেন্টের নাম বসবে
        statusBanner.innerText = "খেলা শুরু হয়েছে!";
        statusBanner.classList.add('connected');
        oppNameDisplay.innerText = data.opponentName || "প্লেয়ার ২";
        arenaDisplay.innerText = "আপনার চালের জন্য স্পিন করুন";
        
        // স্পিন বাটন একটিভ করা
        spinButton.disabled = false;
        spinButton.style.color = "#28a745";
        spinButton.style.borderColor = "#28a745";
    });

    // ৩. স্পিন বাটনে ক্লিক লজিক
    spinButton.addEventListener('click', () => {
        // র্যান্ডম চাল বা পয়েন্ট জেনারেট (১ থেকে ১০)
        const points = Math.floor(Math.random() * 10) + 1;
        arenaDisplay.innerText = `আপনি পেয়েছেন: ${points} পয়েন্ট!`;
        
        // সার্ভারে স্কোর আপডেট পাঠানো
        socket.emit('submit_score', { score: points });
    });

    // ৪. রিয়েল-টাইম স্কোর আপডেট রিসিভ করা (অন্য প্লেয়ার চাল দিলে)
    socket.on('update_scores', (scores) => {
        document.getElementById('my-score').innerText = scores.myScore;
        document.getElementById('my-moves').innerText = `${scores.myMoves}/10`;
        
        document.getElementById('opp-score').innerText = scores.oppScore;
        document.getElementById('opp-moves').innerText = `${scores.oppMoves}/10`;
    });

    // ৫. কানেকশন কোনো কারণে ড্রপ করলে বা ইরর হলে
    socket.on('connect_error', (error) => {
        console.error('Gateway Connection Error:', error);
        statusBanner.innerText = "গেটওয়ে কানেক্ট করা হচ্ছে...";
        statusBanner.classList.remove('connected');
        oppNameDisplay.innerText = "লোডিং...";
        arenaDisplay.innerText = "কানেকশনের জন্য অপেক্ষা করুন...";
        spinButton.disabled = true;
    });

    socket.on('disconnect', () => {
        statusBanner.innerText = "কানেকশন বিচ্ছিন্ন হয়েছে!";
        statusBanner.classList.remove('connected');
        spinButton.disabled = true;
    });
</script>

</body>
</html>
