<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High-Tech Arena - Livegame2</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #07080c;
            --card-bg: rgba(18, 22, 35, 0.7);
            --neon-green: #00ff66;
            --neon-red: #ff3366;
            --panel-white: #ffffff;
            --border-glow: rgba(255, 255, 255, 0.05);
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: radial-gradient(circle at top, #151a30 0%, var(--bg-dark) 100%);
            color: #fff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* প্রিমিয়াম ভার্সেস হেডার */
        .vs-header-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 600px;
            background: var(--card-bg);
            border: 1px solid var(--border-glow);
            border-radius: 20px;
            padding: 15px 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            margin-bottom: 20px;
        }
        .profile-side { width: 42%; display: flex; flex-direction: column; }
        .profile-side.left { text-align: left; align-items: flex-start; }
        .profile-side.right { text-align: right; align-items: flex-end; }
        
        .team-tag { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; font-weight: bold; margin-bottom: 4px; }
        .left .team-tag { color: var(--panel-white); }
        .right .team-tag { color: var(--neon-red); }

        .username-lbl { font-size: 18px; font-weight: 700; color: #fff; margin-bottom: 6px; }
        .score-counter {
            font-size: 14px;
            background: rgba(255,255,255,0.05);
            padding: 4px 12px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.1);
            color: #bdc7d4;
        }
        .score-counter span { font-weight: 700; color: #fff; }

        .vs-center-glow {
            width: 50px;
            height: 50px;
            background: #000;
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 900;
            font-style: italic;
            font-size: 18px;
            color: var(--neon-red);
            box-shadow: 0 0 15px rgba(255, 51, 102, 0.3);
        }

        /* টার্ন ইন্ডিকেটর */
        .hud-turn-status {
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            padding: 10px 24px;
            border-radius: 30px;
            background: rgba(255, 188, 0, 0.1);
            border: 1px solid rgba(255, 188, 0, 0.2);
            color: #ffbc00;
            margin-bottom: 25px;
            box-shadow: 0 0 20px rgba(255, 188, 0, 0.05);
        }

        /* ২০ গ্রিড হাই-টেক্সচার বোর্ড */
        .matrix-grid-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            width: 100%;
            max-width: 550px;
            background: rgba(0,0,0,0.5);
            padding: 12px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.03);
            margin-bottom: 30px;
        }
        .matrix-cell {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 10px;
            padding: 16px 5px;
            font-size: 11px;
            font-weight: 600;
            color: #94a3b8;
            transition: all 0.2s ease;
            text-align: center;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .matrix-cell.active-glow {
            background: var(--neon-green);
            color: #000;
            border-color: var(--neon-green);
            box-shadow: 0 0 20px var(--neon-green);
            transform: scale(1.04);
            font-weight: 700;
        }

        /* স্পিন কন্ট্রোলার নিডেল ও রিয়েল বাটন */
        .engine-spin-zone { position: relative; width: 140px; margin-bottom: 20px; }
        .mechanical-needle {
            font-size: 26px;
            color: var(--neon-green);
            position: absolute;
            top: -22px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 5;
            text-shadow: 0 0 10px var(--neon-green);
            animation: bounce 1.5s infinite alternate;
        }
        @keyframes bounce { 0% { top: -22px; } 100% { top: -16px; } }

        .quantum-spin-btn {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid rgba(255, 255, 255, 0.1);
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            color: #fff;
            font-size: 16px;
            font-weight: 800;
            letter-spacing: 2px;
            cursor: pointer;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6), inset 0 2px 5px rgba(255,255,255,0.1);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .quantum-spin-btn:not(:disabled):hover {
            border-color: var(--neon-green);
            box-shadow: 0 0 25px rgba(0, 255, 102, 0.4);
            transform: scale(1.05);
        }
        .quantum-spin-btn:disabled {
            background: #11141a;
            color: #475569;
            border-color: rgba(255,255,255,0.02);
            cursor: not-allowed;
        }

        /* প্রিমিয়াম উইনিং মডাল */
        .overlay-screen {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 6, 10, 0.95);
            justify-content: center; align-items: center; z-index: 999;
        }
        .leaderboard-board {
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 28px;
            padding: 35px;
            width: 90%; max-width: 420px;
            text-align: center;
            box-shadow: 0 25px 60px rgba(0,0,0,0.8);
        }
        .leaderboard-board h2 { font-size: 32px; margin-top: 0; margin-bottom: 15px; letter-spacing: 1px; }
        .stats-row {
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            padding: 15px;
            font-size: 14px;
            line-height: 1.8;
            color: #cbd5e1;
            border: 1px solid rgba(255,255,255,0.02);
        }
        .btn-hub-return {
            background: var(--panel-white);
            color: #000;
            font-weight: 700;
            border: none;
            border-radius: 12px;
            padding: 14px 28px;
            margin-top: 25px;
            cursor: pointer;
            font-size: 15px;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-hub-return:hover { background: var(--neon-green); transform: translateY(-2px); }
    </style>
</head>
<body>

    <div class="vs-header-panel">
        <div class="profile-side left">
            <div class="team-tag">TEAM WHITE</div>
            <div class="username-lbl" id="left-user"><i class="fa-solid fa-circle-user"></i> Loading...</div>
            <div class="score-counter" id="left-score">Hits: <span>0 / 10</span></div>
        </div>
        <div class="vs-center-glow">VS</div>
        <div class="profile-side right">
            <div class="team-tag">TEAM RED</div>
            <div class="username-lbl" id="right-user">Loading... <i class="fa-solid fa-user-astronaut"></i></div>
            <div class="score-counter" id="right-score">Hits: <span>0 / 10</span></div>
        </div>
    </div>

    <div class="hud-turn-status" id="turnStatus">Synchronizing Systems...</div>

    <div class="matrix-grid-board" id="boardGrid"></div>

    <div class="engine-spin-zone">
        <div class="mechanical-needle"><i class="fa-solid fa-caret-down"></i></div>
        <button class="quantum-spin-btn" id="spinButton" disabled>SPIN</button>
    </div>

    <div class="overlay-screen" id="winModal">
        <div class="leaderboard-board">
            <h2 id="winResultTitle">MATCH OVER</h2>
            <div class="stats-row" id="winDetails">Calculating tactical metrics...</div>
            <button class="btn-hub-return" onclick="window.location.href='home.html'">
                <i class="fa-solid fa-house-chimney"></i> Return To Base
            </button>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCyx_79aq2E4xTjH9v8IziuYVuoZd4jXk4",
        authDomain: "index-html-75ded.firebaseapp.com",
        databaseURL: "https://index-html-75ded-default-rtdb.firebaseio.com",
        projectId: "index-html-75ded",
        storageBucket: "index-html-75ded.firebasestorage.app",
        messagingSenderId: "833678381856",
        appId: "1:833678381856:web:ab7ae69f59539e79eabd45",
        measurementId: "G-4704LVRXSH"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const myUsername = localStorage.getItem("username");
    const roomId = localStorage.getItem("roomId") || "room_101";
    const roomRef = ref(db, 'rooms/' + roomId);

    let player1 = "", player2 = "";
    let nameList = [];

    function generateBoard(p1, p2) {
        let arr = Array(10).fill(p1).concat(Array(10).fill(p2));
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    onValue(roomRef, (snapshot) => {
        const data = snapshot.val();
        if(!data) return;

        player1 = data.player1;
        player2 = data.player2;

        if(myUsername === player1) {
            document.getElementById("left-user").innerHTML = `<i class="fa-solid fa-circle-user"></i> ${player1}`;
            document.getElementById("right-user").innerHTML = `${player2} <i class="fa-solid fa-user-astronaut"></i>`;
        } else {
            document.getElementById("left-user").innerHTML = `<i class="fa-solid fa-circle-user"></i> ${player2}`;
            document.getElementById("right-user").innerHTML = `${player1} <i class="fa-solid fa-user-astronaut"></i>`;
        }

        if(!data.boardNames && myUsername === player1) {
            const newBoard = generateBoard(player1, player2);
            update(ref(db, 'rooms/' + roomId), { boardNames: newBoard });
        }

        if(data.boardNames) {
            nameList = data.boardNames;
            renderBoardGrid();
        }

        if(data.gameState) {
            const state = data.gameState;
            
            if(myUsername === player1) {
                document.getElementById("left-score").innerHTML = `Hits: <span>${state.p1Score} / 10</span>`;
                document.getElementById("right-score").innerHTML = `Hits: <span>${state.p2Score} / 10</span>`;
            } else {
                document.getElementById("left-score").innerHTML = `Hits: <span>${state.p2Score} / 10</span>`;
                document.getElementById("right-score").innerHTML = `Hits: <span>${state.p1Score} / 10</span>`;
            }

            if(state.turn === myUsername) {
                document.getElementById("turnStatus").innerText = "YOUR TURN • INITIATE SPIN";
                document.getElementById("spinButton").disabled = false;
            } else {
                document.getElementById("turnStatus").innerText = `WAITING FOR ${state.turn}...`;
                document.getElementById("spinButton").disabled = true;
            }

            if(data.lastSpinIndex !== undefined && data.animating) {
                runSpinAnimation(data.lastSpinIndex);
            }

            if(state.totalSpins >= 20) {
                endGame(state.p1Score, state.p2Score);
            }
        }
    });

    function renderBoardGrid() {
        const grid = document.getElementById("boardGrid");
        grid.innerHTML = "";
        nameList.forEach((name, index) => {
            const cell = document.createElement("div");
            cell.classList.add("matrix-cell");
            cell.id = `cell-${index}`;
            cell.innerText = name;
            grid.appendChild(cell);
        });
    }

    document.getElementById("spinButton").addEventListener("click", () => {
        document.getElementById("spinButton").disabled = true;
        const randomIndex = Math.floor(Math.random() * 20);
        update(roomRef, { lastSpinIndex: randomIndex, animating: true });
    });

    function runSpinAnimation(targetIndex) {
        let currentIdx = 0;
        let speed = 80; 
        let cycles = 0;

        update(roomRef, { animating: false }); 

        const interval = setInterval(() => {
            document.querySelectorAll('.matrix-cell').forEach(c => c.classList.remove('active-glow'));
            
            const currentCell = document.getElementById(`cell-${currentIdx}`);
            if(currentCell) currentCell.classList.add('active-glow');

            if(cycles > 1 && currentIdx === targetIndex) {
                clearInterval(interval);
                setTimeout(() => { processSpinResult(targetIndex); }, 800);
            }

            currentIdx = (currentIdx + 1) % 20;
            if(currentIdx === 0) cycles++;
        }, speed);
    }

    function processSpinResult(index) {
        if(myUsername !== player1) return;

        onValue(roomRef, (snapshot) => {
            const data = snapshot.val();
            const state = data.gameState;
            const roundWinner = nameList[index];

            let p1Inc = roundWinner === player1 ? 1 : 0;
            let p2Inc = roundWinner === player2 ? 1 : 0;
            let nextTurn = state.turn === player1 ? player2 : player1;

            update(ref(db, 'rooms/' + roomId + '/gameState'), {
                p1Score: state.p1Score + p1Inc,
                p2Score: state.p2Score + p2Inc,
                totalSpins: state.totalSpins + 1,
                turn: nextTurn
            });
        }, { onlyOnce: true });
    }

    function endGame(p1Score, p2Score) {
        const modal = document.getElementById("winModal");
        const title = document.getElementById("winResultTitle");
        const details = document.getElementById("winDetails");

        let iWon = false;
        let myFinalScore = (myUsername === player1) ? p1Score : p2Score;
        let oppFinalScore = (myUsername === player1) ? p2Score : p1Score;

        if(p1Score === p2Score) {
            title.innerText = "TACTICAL DRAW";
            title.style.color = "#ffbc00";
        } else if((myUsername === player1 && p1Score > p2Score) || (myUsername === player2 && p2Score > p1Score)) {
            title.innerText = "VICTORY ACHIEVED";
            title.style.color = var(--neon-green);
            iWon = true;
        } else {
            title.innerText = "MISSION FAILED";
            title.style.color = var(--neon-red);
        }

        details.innerHTML = `
            Your Total Hits: ${myFinalScore} / 10<br>
            Opponent Hits: ${oppFinalScore} / 10<br><br>
            ${iWon ? "<span style='color: #00ff66;'>Prize pool credited to your dashboard securely.</span>" : "Better luck in the next drop."}
        `;

        modal.style.display = "flex";
    }
</script>
</body>
</html>
