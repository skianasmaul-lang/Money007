<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job 3 - Typing Task</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: #121212; color: #fff; padding-bottom: 80px; }
        .header { background: #1e1e1e; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #ffcc00; }
        .logo { font-size: 22px; font-weight: bold; color: #ffcc00; text-decoration: none; }
        .balance-box { background: #2a2a2a; padding: 8px 18px; border-radius: 20px; border: 1px solid #ffcc00; font-weight: bold; }
        
        .main-content { padding: 20px; max-width: 500px; margin: auto; }
        .job-header { display: flex; justify-content: space-between; font-size: 18px; color: #ffcc00; margin-bottom: 20px; font-weight: bold; }
        .task-box { background: #1e1e1e; padding: 20px; border-radius: 15px; border: 1px solid #ffcc00; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .text-to-copy { background: #222; padding: 15px; border-radius: 8px; border-left: 4px solid #ffcc00; font-size: 14px; line-height: 1.6; color: #fff; margin-bottom: 20px; text-align: left; user-select: none; }
        textarea { width: 100%; padding: 12px; background: #2a2a2a; border: 1px solid #333; color: #fff; border-radius: 8px; margin-bottom: 15px; font-size: 15px; resize: none; }
        .btn-submit { background: #ffcc00; color: #000; border: none; padding: 14px; width: 100%; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }

        .bottom-nav { background: #1e1e1e; position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; padding: 12px 0; border-top: 2px solid #ffcc00; }
        .nav-item { color: #aaa; text-decoration: none; font-size: 12px; text-align: center; }
    </style>
</head>
<body>

<div class="header">
    <a href="home.html" class="logo">money 007</a>
    <div class="balance-box">৳ <span id="userBalance">0.00</span></div>
</div>

<div class="main-content">
    <div class="job-header">
        <span>Job 3: লেখা টাইপ করুন</span>
        <span id="taskCount">0/15</span>
    </div>
    
    <div class="task-box">
        <div class="text-to-copy" id="targetText">로드 হচ্ছে...</div>
        <textarea id="textInput" rows="4" placeholder="উপরের প্যারাগ্রাফটি হুবহু দেখে দেখে এখানে টাইপ করুন..."></textarea>
        <button class="btn-submit" onclick="validateTyping()">Submit Text</button>
    </div>
</div>

<div class="bottom-nav">
    <a href="home.html" class="nav-item">🏠<br>হোম</a>
    <a href="history.html" class="nav-item">📋<br>হিস্টরি</a>
    <a href="withdraw.html" class="nav-item">💰<br>উত্তোলন</a>
    <a href="refer.html" class="nav-item">👥<br>রেফার</a>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCyx_79aq2E4xTjH9v8IziuYVuoZd4jXk4",
        authDomain: "index-html-75ded.firebaseapp.com",
        databaseURL: "https://index-html-75ded-default-rtdb.firebaseio.com",
        projectId: "index-html-75ded",
        storageBucket: "index-html-75ded.firebasestorage.app",
        messagingSenderId: "833678381856",
        appId: "1:833678381856:web:ab7ae69f59539e79eabd45"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const userPhone = localStorage.getItem('loggedInUser');

    let currentBalance = 0, count = 0, correctCount = 0, currentString = "";

    const textsList = [
        "বাংলাদেশ একটি স্বাধীন ও সার্বভৌম রাষ্ট্র। এর প্রাকৃতিক রূপ ও সৌন্দর্য অত্যন্ত চমৎকার ও বৈচিত্র্যময়।",
        "সততাহীন জীবন পশুর সমান। সফল হতে হলে কঠোর পরিশ্রম ও নিয়মিত নিয়মানুবর্তিতা মেনে চলতে হবে।",
        "ডিজিটাল বাংলাদেশ এখন অনেকটাই বাস্তব রূপ নিয়েছে। তরুণ সমাজ ঘরে বসেই ফ্রিল্যান্সিং করে স্বাবলম্বী হচ্ছে।",
        "শিক্ষা জাতির মেরুদণ্ড। কোনো জাতি শিক্ষা ছাড়া উন্নত শিখরে পৌঁছাতে পারে না।"
    ];

    db.ref('users/' + userPhone).on('value', (snapshot) => {
        if(snapshot.exists()) {
            currentBalance = snapshot.val().balance || 0;
            document.getElementById('userBalance').innerText = currentBalance.toFixed(2);
        }
    });

    function loadTypingTask() {
        if(count >= 15) { completeJob(); return; }
        document.getElementById('taskCount').innerText = `${count}/15`;
        
        currentString = textsList[Math.floor(Math.random() * textsList.length)];
        document.getElementById('targetText').innerText = currentString;
        document.getElementById('textInput').value = "";
    }
    loadTypingTask();

    function validateTyping() {
        let userTyped = document.getElementById('textInput').value.trim();
        if(!userTyped) { Swal.fire('ভুল', 'আগে কিছু টাইপ করুন!', 'warning'); return; }

        if(userTyped === currentString) {
            correctCount++;
            Swal.fire({icon:'success', title:'নিখুঁত হয়েছে!', timer:600, showConfirmButton:false});
        } else {
            Swal.fire({icon:'error', title:'লেখা মেলেনি!', text:'হুবহু বা দাড়ি-কমা ভুল ছিল!', timer:1000, showConfirmButton:false});
        }
        
        count++; // ভুল বা সঠিক যাই হোক কাউন্ট বাড়বে
        setTimeout(loadTypingTask, 600);
    }

    function completeJob() {
        let baseReward = (correctCount / 15) * 1.0;
        let reward = parseFloat(Math.max(0.1, baseReward).toFixed(2));

        const updates = {};
        updates['users/' + userPhone + '/balance'] = currentBalance + reward;
        updates['users/' + userPhone + '/job3Time'] = Date.now();
        
        db.ref().update(updates).then(() => {
            db.ref('history/' + userPhone).push({
                type: "Job 3 (Typing) Complete",
                amount: reward,
                date: new Date().toLocaleDateString()
            });
            
            Swal.fire({
                title: 'টাইপিং টাস্ক রেজাল্ট!',
                html: `<div style="text-align:left; font-size:16px;">
                        <b>মোট টাস্ক:</b> ১৫টি<br>
                        <b style="color:green;">সঠিক টাইপিং:</b> ${correctCount}টি<br>
                        <b style="color:red;">ভুল টাইপিং:</b> ${15 - correctCount}টি<br><br>
                        <b style="color:#ffcc00; font-size:18px;">আপনার ইনকাম: ৳${reward}</b>
                       </div>`,
                icon: 'success',
                confirmButtonText: 'হোমে ফিরে যান'
            }).then(() => {
                window.location.href = 'home.html';
            });
        });
    }
</script>
</body>
</html>
