
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Spin Game - Premium Multiplayer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #0f172a; font-family: sans-serif; overflow-x: hidden; }
        .wheel-container { position: relative; width: 280px; height: 280px; }
        #spinWheel {
            width: 100%; height: 100%;
            border-radius: 50%;
            border: 8px solid #f59e0b;
            box-shadow: 0 0 25px rgba(245, 158, 11, 0.6);
            /* ৪ সেকেন্ডের ফাস্ট ও স্মুথ স্পিনিং এফেক্ট */
            transition: transform 4s cubic-bezier(0.15, 0.85, 0.3, 1);
            will-change: transform;
        }
        .wheel-pointer {
            position: absolute; top: -15px; left: 50%;
            transform: translateX(-50%);
            width: 0; height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 30px solid #ef4444;
            z-index: 10;
            filter: drop-shadow(0px 2px 5px rgba(0,0,0,0.5));
        }
    </style>
</head>
<body class="max-w-md mx-auto min-h-screen flex flex-col justify-between shadow-2xl relative text-white bg-slate-900 pb-6">

    <div class="bg-red-950/40 border-b border-red-500/30 p-4 flex justify-between items-center rounded-b-[25px]">
        <div class="flex items-center gap-2.5">
            <div class="w-10 h-10 bg-red-600 rounded-full flex items-center justify-center text-white font-bold border border-red-400">
                <i class="fa-solid fa-user-ninja"></i>
            </div>
            <div>
                <div class="flex items-center gap-2">
                    <span class="text-[10px] text-red-400 font-bold block uppercase tracking-wider">Opponent</span>
                    <span id="oppLiveBadge" class="text-[9px] bg-emerald-500/20 text-emerald-400 border border-emerald-500/40 px-1.5 py-0.2 rounded-full font-extrabold animate-pulse hidden">● LIVE</span>
                </div>
                <h3 id="opponentName" class="font-bold text-sm text-gray-200">Loading...</h3>
            </div>
        </div>
        <div class="bg-red-900/50 px-4 py-1.5 rounded-xl border border-red-500/30 text-right">
            <span class="text-[9px] text-red-300 block font-medium">Points</span>
            <span id="opponentScore" class="font-mono font-black text-xl text-red-400">0</span>
        </div>
    </div>

    <div class="flex-1 flex flex-col items-center justify-center px-4 my-4 space-y-6">
        
        <div id="turnStatusBanner" class="w-full text-center py-2.5 rounded-full font-bold text-sm tracking-wide bg-slate-800 border border-slate-700 shadow">
            ম্যাচ সিকিউরিটি চেক হচ্ছে...
        </div>

        <div class="flex justify-between w-full px-6 text-xs font-semibold text-gray-400">
            <span>আপনার স্পিন বাকি: <span id="myChances" class="text-emerald-400 font-bold font-mono">10</span>/10</span>
            <span>প্রতিপক্ষের বাকি: <span id="oppChances" class="text-red-400 font-bold font-mono">10</span>/10</span>
        </div>

        <div class="wheel-container my-2">
            <div class="wheel-pointer"></div>
            <canvas id="spinWheel" width="300" height="300"></canvas>
        </div>

    </div>

    <div class="px-4 space-y-4">
        <button id="mainSpinBtn" disabled onclick="triggerSecureSpinAction()" class="w-full bg-amber-500 hover:bg-amber-600 disabled:bg-slate-700 disabled:text-gray-400 text-slate-950 font-black py-4 rounded-2xl text-xl shadow-lg shadow-amber-500/20 tracking-wider active:scale-95 transition-all flex items-center justify-center gap-2">
            <i class="fa-solid fa-play"></i> SPIN NOW
        </button>

        <div class="bg-emerald-950/40 border border-emerald-500/30 p-4 flex justify-between items-center rounded-2xl">
            <div class="flex items-center gap-2.5">
                <div class="w-10 h-10 bg-emerald-600 rounded-full flex items-center justify-center text-white font-bold border border-emerald-400">
                    <i class="fa-solid fa-user-astronaut"></i>
                </div>
                <div>
                    <div class="flex items-center gap-2">
                        <span class="text-[10px] text-emerald-400 font-bold block uppercase tracking-wider">You (Player)</span>
                        <span id="myLiveBadge" class="text-[9px] bg-emerald-500/20 text-emerald-400 border border-emerald-500/40 px-1.5 py-0.2 rounded-full font-extrabold animate-pulse">● LIVE</span>
                    </div>
                    <h3 id="myName" class="font-bold text-sm text-gray-200">Loading...</h3>
                </div>
            </div>
            <div class="bg-emerald-900/50 px-4 py-1.5 rounded-xl border border-emerald-500/30 text-right">
                <span class="text-[9px] text-emerald-300 block font-medium">Your Points</span>
                <span id="myScore" class="font-mono font-black text-xl text-emerald-400">0</span>
            </div>
        </div>
    </div>

    <div id="winnerPopupScreen" class="fixed inset-0 bg-black/90 z-50 flex items-center justify-center p-4 hidden">
        <div class="bg-slate-800 border-2 border-amber-400 rounded-3xl p-6 w-full max-w-sm text-center space-y-5 shadow-2xl relative">
            <div class="w-20 h-20 bg-amber-500 text-slate-950 text-4xl rounded-full flex items-center justify-center mx-auto shadow-lg shadow-amber-500/30">
                <i class="fa-solid fa-trophy animate-bounce"></i>
            </div>
            <h2 class="text-2xl font-black tracking-wide text-amber-400">ম্যাচ সমাপ্ত!</h2>
            
            <div class="bg-slate-900 rounded-xl p-4 text-left space-y-2 font-mono text-sm border border-slate-700">
                <div class="flex justify-between border-b border-slate-800 pb-1.5">
                    <span id="popP1Name">Player 1:</span>
                    <span id="popP1Score" class="text-amber-400 font-bold">0 Pts</span>
                </div>
                <div class="flex justify-between pt-0.5">
                    <span id="popP2Name">Player 2:</span>
                    <span id="popP2Score" class="text-amber-400 font-bold">0 Pts</span>
                </div>
            </div>

            <div id="winnerTextMessage" class="text-lg font-bold text-emerald-400 bg-emerald-950/50 py-2.5 rounded-xl border border-emerald-500/30">
                Winner Status...
            </div>
            <p class="text-[11px] text-gray-400 animate-pulse">৩ সেকেন্ডের মধ্যে হোমপেজে রিডাইরেক্ট করা হচ্ছে...</p>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCyx_79aq2E4xTjH9v8IziuYVuoZd4jXk4",
            authDomain: "index-html-75ded.firebaseapp.com",
            databaseURL: "https://index-html-75ded-default-rtdb.firebaseio.com",
            projectId: "index-html-75ded",
            storageBucket: "index-html-75ded.firebasestorage.app",
            messagingSenderId: "833678381856",
            appId: "1:833678381856:web:ab7ae69f59539e79eabd45"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const currentUser = localStorage.getItem('currentUser');
        const matchId = localStorage.getItem('currentMatchId');

        if(!currentUser) window.location.href = 'index.html';
        if(!matchId) window.location.href = 'home.html';

        const wheelValues = [10, 50, 20, 5, 100, 15, 30, 45, 60, 25, 80, 5, 40, 75, 90, 15, 35, 55, 70, 100];
        let p1Key = "", p2Key = "";
        let isLocalWinnerProcessed = false;
        let localSpinningActive = false;

        // --- CANVAS WHEEL GENERATOR ---
        function drawPremiumWheelGraphic() {
            const canvas = document.getElementById("spinWheel");
            const ctx = canvas.getContext("2d");
            const numSlices = 20;
            const radius = canvas.width / 2;
            const sliceAngle = (2 * Math.PI) / numSlices;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (let i = 0; i < numSlices; i++) {
                ctx.beginPath();
                ctx.moveTo(radius, radius);
                ctx.arc(radius, radius, radius - 10, i * sliceAngle, (i + 1) * sliceAngle);
                ctx.fillStyle = i % 2 === 0 ? (i % 4 === 0 ? "#1e293b" : "#0f172a") : (i % 3 === 0 ? "#10b981" : "#3b82f6");
                ctx.fill();
                ctx.stroke();

                ctx.save();
                ctx.translate(radius, radius);
                ctx.rotate(i * sliceAngle + sliceAngle / 2);
                ctx.fillStyle = "#ffffff";
                ctx.font = "bold 12px sans-serif";
                ctx.textAlign = "right";
                ctx.fillText(wheelValues[i], radius - 25, 5);
                ctx.restore();
            }
        }

        // --- ROOM INITIALIZATION ---
        database.ref('matches/' + matchId).once('value', snapshot => {
            if(!snapshot.exists()) { window.location.href = 'home.html'; return; }
            const match = snapshot.val();
            p1Key = match.creator;
            p2Key = match.joinedUser;

            if(currentUser === p1Key) {
                database.ref(`game_sessions/${matchId}`).once('value', gameSnap => {
                    if(!gameSnap.exists()) {
                        const chosenFirstTurn = Math.random() < 0.5 ? p1Key : p2Key;
                        database.ref(`game_sessions/${matchId}`).set({
                            turn: chosenFirstTurn,
                            isSpinning: false,
                            targetRotation: 0,
                            gainedPoints: 0,
                            [`points_${p1Key}`]: 0,
                            [`points_${p2Key}`]: 0,
                            [`chances_${p1Key}`]: 10,
                            [`chances_${p2Key}`]: 10
                        });
                    }
                });
            }
            startSecureSyncEngine();
        });

        // --- OPTIMIZED NETWORKING & SECURE DATA SYNC ---
        function startSecureSyncEngine() {
            if(currentUser === p1Key) {
                document.getElementById('myName').innerText = "@" + p1Key;
                document.getElementById('opponentName').innerText = p2Key ? "@" + p2Key : "Waiting...";
            } else {
                document.getElementById('myName').innerText = "@" + p2Key;
                document.getElementById('opponentName').innerText = "@" + p1Key;
            }

            database.ref('matches/' + matchId).on('value', matchSnap => {
                if(!matchSnap.exists()) { window.location.href = 'home.html'; return; }
                const currentMatchData = matchSnap.val();
                if(currentMatchData.joinedUser) {
                    p2Key = currentMatchData.joinedUser;
                    document.getElementById('opponentName').innerText = currentUser === p1Key ? "@" + p2Key : "@" + p1Key;
                    document.getElementById('oppLiveBadge').classList.remove('hidden');
                }
            });

            // ইন্টারনেট প্রোটোকল অপ্টিমাইজড লিসেনার
            database.ref(`game_sessions/${matchId}`).on('value', sessionSnap => {
                if(!sessionSnap.exists()) return;
                const session = sessionSnap.val();

                // লাইভ স্কোরবোর্ড আপডেট
                document.getElementById('myScore').innerText = session[`points_${currentUser}`] || 0;
                document.getElementById('opponentScore').innerText = session[`points_${currentUser === p1Key ? p2Key : p1Key}`] || 0;
                document.getElementById('myChances').innerText = session[`chances_${currentUser}`] || 0;
                document.getElementById('oppChances').innerText = session[`chances_${currentUser === p1Key ? p2Key : p1Key}`] || 0;

                const activeTurnUser = session.turn;
                const spinBtn = document.getElementById('mainSpinBtn');
                const banner = document.getElementById('turnStatusBanner');

                // চাকা ঘোরার রিয়েল-টাইম গ্লোবাল সিঙ্ক (স্লো নেটওয়ার্ক প্রটেকশন সহ)
                if(session.isSpinning && !localSpinningActive) {
                    localSpinningActive = true;
                    document.getElementById('spinWheel').style.transform = `rotate(${session.targetRotation}deg)`;
                    
                    // ৪ সেকেন্ড পর লোকাল স্ক্রিন স্ট্যাটাস রিলিজ হবে
                    setTimeout(() => {
                        localSpinningActive = false;
                    }, 4000);
                }

                // বাটন লক ও ব্যানার মেসেজিং
                if(session.isSpinning || localSpinningActive) {
                    spinBtn.disabled = true;
                    banner.innerText = "⚡ চাকাটি অলরেডি ঘুরছে... লক্ষ্য রাখুন ⚡";
                    banner.className = "w-full text-center py-2.5 rounded-full font-bold text-sm tracking-wide bg-amber-950 text-amber-400 border border-amber-600 shadow";
                } else {
                    if(activeTurnUser === currentUser) {
                        spinBtn.disabled = false;
                        banner.innerText = "★ এবার আপনার চান্স! স্পিন করুন ★";
                        banner.className = "w-full text-center py-2.5 rounded-full font-bold text-sm tracking-wide bg-emerald-950 border border-emerald-500 text-emerald-400 shadow animate-pulse";
                    } else {
                        spinBtn.disabled = true;
                        banner.innerText = `● এবার প্রতিপক্ষের (@${activeTurnUser}) চান্স! অপেক্ষা করুন ●`;
                        banner.className = "w-full text-center py-2.5 rounded-full font-bold text-sm tracking-wide bg-red-950 border border-red-900 text-red-400 shadow";
                    }
                }

                // গেম ওভার ভেরিফিকেশন কন্ডিশন
                if(session[`chances_${p1Key}`] === 0 && session[`chances_${p2Key}`] === 0 && !session.isSpinning && !localSpinningActive) {
                    database.ref('matches/' + matchId).once('value', mSnap => {
                        processSecureWinnerPayout(mSnap.val(), session);
                    });
                }
            });
        }

        // --- 100% SECURE FIREBASE TRANSACTION SPIN ENGINE ---
        function triggerSecureSpinAction() {
            if(localSpinningActive) return;
            
            const spinBtn = document.getElementById('mainSpinBtn');
            spinBtn.disabled = true;

            const randomSliceIndex = Math.floor(Math.random() * 20);
            const gainedPoints = wheelValues[randomSliceIndex];
            
            const degreesPerSlice = 360 / 20;
            const targetSliceDeg = 360 - (randomSliceIndex * degreesPerSlice) - (degreesPerSlice / 2);
            const finalRotationDegree = (360 * 8) + targetSliceDeg; // ৮ বার স্পিডে হাই-স্পিড রোটেশন এফেক্ট

            // ধাপ ১: ফায়ারবেসকে জানানো যে স্পিন শুরু হয়েছে (ডাবল ক্লিক ও ইন্টারনেট ড্রপ সিকিউরিটি)
            database.ref(`game_sessions/${matchId}`).update({
                isSpinning: true,
                targetRotation: finalRotationDegree,
                gainedPoints: gainedPoints
            }).then(() => {
                // ৪ সেকেন্ড ফাস্ট চাকা ঘোরার প্রতীক্ষা
                setTimeout(() => {
                    const nextTurnUser = currentUser === p1Key ? p2Key : p1Key;
                    
                    // ধাপ ২: ফায়ারবেস ট্রানজেকশন রান করা (এক পয়েন্টও যেন লস না হয়)
                    database.ref(`game_sessions/${matchId}`).transaction(currentSession => {
                        if (currentSession) {
                            if (currentSession.isSpinning) {
                                currentSession[`points_${currentUser}`] = (currentSession[`points_${currentUser}`] || 0) + currentSession.gainedPoints;
                                currentSession[`chances_${currentUser}`] = (currentSession[`chances_${currentUser}`] || 10) - 1;
                                currentSession.turn = nextTurnUser;
                                currentSession.isSpinning = false; // স্পিন কমপ্লিট লক ওপেন
                            }
                        }
                        return currentSession;
                    });
                }, 4000);
            }).catch(err => {
                console.error("Network Error: ", err);
                spinBtn.disabled = false;
            });
        }

        // --- FINAL SECURE PAYOUT SYSTEM ---
        function processSecureWinnerPayout(matchData, sessionData) {
            if(isLocalWinnerProcessed) return;
            isLocalWinnerProcessed = true;

            const p1Total = sessionData[`points_${p1Key}`] || 0;
            const p2Total = sessionData[`points_${p2Key}`] || 0;
            let winnerUser = "";
            let isTie = false;

            if(p1Total > p2Total) winnerUser = p1Key;
            else if(p2Total > p1Total) winnerUser = p2Key;
            else isTie = true;

            document.getElementById('popP1Name').innerText = "@" + p1Key + ":";
            document.getElementById('popP1Score').innerText = p1Total + " Pts";
            document.getElementById('popP2Name').innerText = "@" + p2Key + ":";
            document.getElementById('popP2Score').innerText = p2Total + " Pts";

            const msgBtn = document.getElementById('winnerTextMessage');
            if(isTie) {
                msgBtn.innerText = "ম্যাচ ড্র হয়েছে! রিফান্ড সফল।";
                msgBtn.className = "text-lg font-bold text-amber-400 bg-amber-950/50 py-2.5 rounded-xl border border-amber-500/30";
            } else {
                msgBtn.innerText = `বিজয়ী: @${winnerUser} 🎉`;
                msgBtn.className = currentUser === winnerUser ? 
                    "text-lg font-bold text-emerald-400 bg-emerald-950/50 py-2.5 rounded-xl border border-emerald-500/30" : 
                    "text-lg font-bold text-red-400 bg-red-950/50 py-2.5 rounded-xl border border-red-500/30";
            }

            document.getElementById('winnerPopupScreen').classList.remove('hidden');

            if(currentUser === p1Key) { 
                if(!isTie) {
                    // মেইন ব্যালেন্স সিকিউর ট্রানজেকশন আপডেট
                    database.ref(`users/${winnerUser}/balance`).transaction(currentBalance => {
                        return (currentBalance || 0) + parseInt(matchData.winningPrize);
                    });
                } else {
                    database.ref(`users/${p1Key}/balance`).transaction(b => (b || 0) + parseInt(matchData.entryFee));
                    database.ref(`users/${p2Key}/balance`).transaction(b => (b || 0) + parseInt(matchData.entryFee));
                }

                setTimeout(() => {
                    database.ref('matches/' + matchId).remove();
                    database.ref(`game_sessions/${matchId}`).remove();
                }, 3000);
            }

            setTimeout(() => {
                localStorage.removeItem('currentMatchId');
                window.location.href = 'home.html';
            }, 3200);
        }

        window.onload = function() {
            drawPremiumWheelGraphic();
        };
    </script>
</body>
</html>
