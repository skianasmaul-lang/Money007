<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Battle Arena</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f4f6f9; font-family: sans-serif; }
        .green-bg { background-color: #3ca745; }
        .match-card { background-color: #e6f9ed; border: 1px solid #ccebd3; }
    </style>
</head>
<body class="max-w-md mx-auto bg-white min-h-screen shadow-xl">

    <div class="green-bg text-white px-4 pt-6 pb-6 rounded-b-[35px] shadow-md flex justify-between items-center">
        <div class="text-center">
            <p id="myUserName" class="font-bold text-sm">Loading...</p>
            <span id="myStatus" class="text-[9px] bg-green-700 px-2 py-0.5 rounded-full">ONLINE</span>
            <div id="myScore" class="text-[10px] mt-1 font-bold">চান্স: 0/10</div>
        </div>
        
        <button onclick="location.reload()" class="bg-white/20 p-2 rounded-full w-10 h-10 flex items-center justify-center">
            <i class="fa fa-sync"></i>
        </button>

        <div class="text-center">
            <p id="oppName" class="font-bold text-sm">Waiting...</p>
            <span id="oppStatus" class="text-[9px] bg-red-600 px-2 py-0.5 rounded-full">OFFLINE</span>
            <div id="oppScore" class="text-[10px] mt-1 font-bold">চান্স: 0/10</div>
        </div>
    </div>

    <div class="p-4 mt-2">
        <div id="turnDisplay" class="text-center font-bold text-emerald-800 mb-4 text-md animate-pulse">অপেক্ষা করুন...</div>
        
        <div class="match-card p-6 rounded-2xl shadow-sm text-center mb-6">
            <h2 id="questionText" class="text-lg font-bold text-gray-800">প্রশ্ন এখানে লোড হচ্ছে...</h2>
        </div>

        <div id="optionsGrid" class="grid grid-cols-2 gap-3 opacity-50 pointer-events-none">
            <button class="bg-white p-3 rounded-xl border border-emerald-300 shadow-sm text-sm font-bold text-emerald-800">Option 1</button>
            <button class="bg-white p-3 rounded-xl border border-emerald-300 shadow-sm text-sm font-bold text-emerald-800">Option 2</button>
            <button class="bg-white p-3 rounded-xl border border-emerald-300 shadow-sm text-sm font-bold text-emerald-800">Option 3</button>
            <button class="bg-white p-3 rounded-xl border border-emerald-300 shadow-sm text-sm font-bold text-emerald-800">Option 4</button>
            <button class="bg-white p-3 rounded-xl border border-emerald-300 shadow-sm text-sm font-bold text-emerald-800">Option 5</button>
            <button class="bg-white p-3 rounded-xl border border-emerald-300 shadow-sm text-sm font-bold text-emerald-800">Option 6</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { /* আপনার কনফিগারেশন */ };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const currentUser = localStorage.getItem('currentUser');
        const matchId = localStorage.getItem('currentMatchId');

        // ইউজার নাম ও স্ট্যাটাস লোড
        db.ref('users/' + currentUser).once('value', snap => {
            document.getElementById('myUserName').innerText = snap.val().username;
        });

        // ম্যাচের রিয়েল-টাইম লজিক
        db.ref('matches/' + matchId).on('value', snap => {
            const m = snap.val();
            if(!m) return;

            // অপনেন্ট থাকলে নাম ও স্ট্যাটাস আপডেট
            if(m.joinedUser) {
                const opp = (m.creator === currentUser) ? m.joinedUser : m.creator;
                document.getElementById('oppName').innerText = opp;
                document.getElementById('oppStatus').innerText = "ONLINE";
                document.getElementById('oppStatus').className = "text-[9px] bg-green-700 px-2 py-0.5 rounded-full";
                
                // গেম শুরু লজিক (অপশনস খুলে দেওয়া)
                document.getElementById('optionsGrid').classList.remove('opacity-50', 'pointer-events-none');
                document.getElementById('turnDisplay').innerText = (m.currentTurn === currentUser) ? "আপনার পালা" : "অপনেন্টের পালা";
            }

            // চান্স কাউন্টার আপডেট
            const myStats = (m.creator === currentUser) ? m.p1Stats : m.p2Stats;
            const oppStats = (m.creator === currentUser) ? m.p2Stats : m.p1Stats;
            document.getElementById('myScore').innerText = `চান্স: ${myStats || 0}/10`;
            document.getElementById('oppScore').innerText = `চান্স: ${oppStats || 0}/10`;
            
            // প্রশ্ন আপডেট
            if(m.currentQuestion) document.getElementById('questionText').innerText = m.currentQuestion;
        });
    </script>
</body>
</html>
