<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Withdraw Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: linear-gradient(135deg, #070a12 0%, #111428 100%); min-height: 100vh; color: #fff; padding-bottom: 90px; overflow-x: hidden; width: 100%; }
        
        /* Mobile-First Responsive Container */
        .app-container { width: 100%; max-width: 480px; margin: 0 auto; position: relative; min-height: 100vh; }

        /* Fixed Real-time Balance Box */
        .wallet-header { padding: 15px 20px; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255,255,255,0.06); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .balance-box { background: rgba(0, 0, 0, 0.5); border: 1px solid rgba(251, 191, 36, 0.4); padding: 8px 16px; border-radius: 12px; font-weight: 700; font-size: 18px; color: #fbbf24; letter-spacing: 0.5px; display: flex; flex-direction: column; }
        .balance-box span { font-size: 9px; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; font-weight: 500; }

        /* Target Content Area */
        .content-body { padding: 20px 15px 0 15px; }
        .section-title { font-size: 12px; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 15px; }

        /* Payment Gateway CSS Grid (3 Methods View) */
        .gateway-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .gateway-card { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); padding: 12px; border-radius: 16px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; height: 110px; cursor: pointer; transition: 0.2s; }
        .gateway-card.active-gate:active { transform: scale(0.98); background: rgba(255,255,255,0.05); }
        
        /* Locked Gates Overlay */
        .lock-overlay { position: absolute; inset: 0; background: rgba(7, 10, 18, 0.75); border-radius: 16px; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 4px; z-index: 5; backdrop-filter: none; -webkit-backdrop-filter: none; }
        .lock-overlay span { background: #ef4444; color: white; font-size: 8px; font-weight: 700; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; }
        .lock-overlay svg { width: 16px; height: 16px; fill: #64748b; }

        /* Pure CSS Icons Drawing Engine */
        .logo-css { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 13px; color: white; margin-bottom: 8px; text-transform: uppercase; }
        .logo-bkash { background: linear-gradient(135deg, #e2125d 0%, #b30a47 100%); }
        .logo-binance { background: linear-gradient(135deg, #f3ba2f 0%, #c3941b 100%); color: #000; }
        .logo-paypal { background: linear-gradient(135deg, #003087 0%, #0079c1 100%); font-style: italic; font-size: 16px; }

        .gate-title { font-size: 12px; font-weight: 500; color: #cbd5e1; }

        /* Luxury Glassmorphism Popup Modal */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); display: none; justify-content: center; align-items: center; z-index: 5000; padding: 15px; }
        .modal-box { background: #111428; border: 1px solid rgba(255,255,255,0.08); width: 100%; max-width: 400px; padding: 20px; border-radius: 20px; position: relative; }
        .modal-title { font-size: 16px; font-weight: 700; margin-bottom: 4px; color: #fff; }
        .modal-desc { font-size: 11px; color: #94a3b8; margin-bottom: 15px; line-height: 1.4; }
        
        .input-group { margin-bottom: 12px; }
        .input-group label { display: block; font-size: 11px; color: #64748b; font-weight: 600; text-transform: uppercase; margin-bottom: 4px; }
        .input-group input { width: 100%; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.08); padding: 10px 14px; border-radius: 10px; color: white; font-size: 13px; outline: none; }
        .input-group input:focus { border-color: #fbbf24; }
        
        .btn-submit { width: 100%; padding: 12px; background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%); border: none; border-radius: 10px; color: #070a12; font-weight: 700; font-size: 13px; cursor: pointer; }
        .close-modal { position: absolute; top: 15px; right: 15px; cursor: pointer; background: rgba(255,255,255,0.05); border: none; width: 26px; height: 26px; border-radius: 50%; color: #94a3b8; font-size: 16px; }

        /* History Cards */
        .history-container { padding: 0 15px; margin-top: 25px; }
        .history-title { font-size: 11px; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
        .history-list { display: flex; flex-direction: column; gap: 8px; }
        .history-card { background: rgba(255,255,255,0.01); border: 1px solid rgba(255,255,255,0.03); padding: 12px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; }
        .hist-meta h4 { font-size: 12px; font-weight: 600; color: #f8fafc; }
        .hist-meta span { font-size: 9px; color: #64748b; }
        .hist-status { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; }
        .hist-amount { font-size: 13px; font-weight: 700; color: #ef4444; }
        .status-badge { font-size: 8px; font-weight: 700; padding: 1px 6px; border-radius: 4px; text-transform: uppercase; }
        .status-pending { background: rgba(245, 158, 11, 0.12); color: #f59e0b; }
        .status-approved { background: rgba(34, 197, 94, 0.12); color: #22c55e; }
        .status-rejected { background: rgba(239, 68, 68, 0.12); color: #ef4444; }

        /* Bottom App Bar Navigation */
        .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; height: 65px; background: rgba(7, 10, 18, 0.95); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border-top: 1px solid rgba(255,255,255,0.06); display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #64748b; text-decoration: none; font-size: 10px; font-weight: 500; }
        .nav-item.active { color: #fbbf24; }
        .nav-item svg { width: 20px; height: 20px; margin-bottom: 4px; fill: currentColor; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="wallet-header">
            <div class="balance-box">
                <div id="walletCounter">$0.000000</div>
                <span>Available Balance</span>
            </div>
            <div style="font-weight: 600; font-size: 13px; color: #94a3b8;">Withdraw Terminal</div>
        </div>

        <div class="content-body">
            <div class="section-title">Select Withdrawal Method</div>
            <div class="gateway-grid" id="withdrawContainer"></div>
        </div>

        <div class="history-container">
            <div class="history-title">Withdrawal History</div>
            <div class="history-list" id="historyStream"></div>
        </div>

        <div class="modal-overlay" id="gatewayModal">
            <div class="modal-box">
                <button class="close-modal" id="closeModalBtn">×</button>
                <div class="modal-title">bKash Outbound Terminal</div>
                <div class="modal-desc">বিকাশ নাম্বার ও উত্তোলনের পরিমাণ বসিয়ে সাবমিট করুন।</div>

                <form id="billingForm">
                    <div class="input-group">
                        <label>bKash Number</label>
                        <input type="tel" id="fTargetPhone" placeholder="01XXXXXXXXX" required>
                    </div>
                    <div class="input-group">
                        <label>Amount (USDT)</label>
                        <input type="number" step="any" id="fAmount" placeholder="Min 0.10 USDT" required>
                        <span id="liveBalanceStatus" style="font-size: 11px; font-weight: 500; display: block; margin-top: 5px;"></span>
                    </div>
                    <button type="submit" class="btn-submit" style="margin-top: 10px;">Submit Request</button>
                </form>
            </div>
        </div>

        <div class="bottom-nav">
            <a href="home.html" class="nav-item">
                <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>Home
            </a>
            <a href="wallet.html" class="nav-item active">
                <svg viewBox="0 0 24 24"><path d="M21 18v1c0 1.1-.9 2-2 2H5c-1.11 0-2-.9-2-2V5c0-1.1.89-2 2-2h14c1.1 0 2 .9 2 2v1h-9c-1.11 0-2 0-2 2v8c0 1.1.89 2 2 2h9zm-9-2h10V8H12v8zm4-2.5c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/></svg>Wallet
            </a>
            <a href="invite.html" class="nav-item">
                <svg viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 1.34 5 3s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>Invite
            </a>
            <a href="profile.html" class="nav-item">
                <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.67-5-3-8-3z"/></svg>Account
            </a>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCyx_79aq2E4xTjH9v8IziuYVuoZd4jXk4",
            authDomain: "index-html-75ded.firebaseapp.com",
            databaseURL: "https://index-html-75ded-default-rtdb.firebaseio.com",
            projectId: "index-html-75ded",
            storageBucket: "index-html-75ded.firebasestorage.app",
            messagingSenderId: "833678381856",
            appId: "1:833678381856:web:ab7ae69f59539e79eabd45",
            measurementId: "G-4704LVRXSH"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();
        const db = firebase.database();

        let currentUser = null;
        let userBalance = 0.00;

        const gateways = [
            { id: "bkash", name: "bKash", css: "logo-bkash", text: "bKash", locked: false },
            { id: "paypal", name: "PayPal", css: "logo-paypal", text: "P", locked: true },
            { id: "binance", name: "Binance Pay", css: "logo-binance", text: "BNB", locked: true }
        ];

        document.getElementById('closeModalBtn').addEventListener('click', closeTerminal);
        document.getElementById('billingForm').addEventListener('submit', transmitTransaction);

        // টাইপ করার সাথে সাথে রিয়েল-টাইম ব্যালেন্স ভ্যালিডেশন চেকার লুপ
        document.getElementById('fAmount').addEventListener('input', function() {
            const currentInput = parseFloat(this.value);
            const statusLabel = document.getElementById('liveBalanceStatus');

            if (isNaN(currentInput) || this.value === "") {
                statusLabel.innerText = "";
                return;
            }

            if (currentInput < 0.10) {
                statusLabel.innerText = "⚠️ সর্বনিম্ন উইথড্র ০.১০ USDT!";
                statusLabel.style.color = "#f59e0b";
            } else if (currentInput > userBalance) {
                statusLabel.innerText = "❌ পর্যাপ্ত ব্যালেন্স নেই! সর্বোচ্চ: $" + userBalance.toFixed(4);
                statusLabel.style.color = "#ef4444";
            } else {
                statusLabel.innerText = "✅ ব্যালেন্স উপলব্ধ আছে (উত্তোলন সম্ভব)";
                statusLabel.style.color = "#22c55e";
            }
        });

        buildGatewayMatrix();

        auth.onAuthStateChanged(function(user) {
            if (user) {
                currentUser = user;
                syncRealtimeBalance();
                streamTransactionHistory();
            } else {
                console.log("সেশন অফলাইন। টেস্ট মোড অ্যাক্টিভেটেড।");
            }
        });

        function syncRealtimeBalance() {
            db.ref('users/' + currentUser.uid + '/balance').on('value', function(snap) {
                userBalance = parseFloat(snap.val()) || 0;
                document.getElementById('walletCounter').innerText = "$" + userBalance.toFixed(6);
            });
        }

        function buildGatewayMatrix() {
            const grid = document.getElementById('withdrawContainer');
            grid.innerHTML = '';
            gateways.forEach(function(gate) {
                const card = document.createElement('div');
                card.className = 'gateway-card ' + (!gate.locked ? 'active-gate' : '');
                
                let overlayHTML = gate.locked ? 
                    '<div class="lock-overlay"><svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg><span>Locked</span></div>' : '';
                
                card.innerHTML = overlayHTML + '<div class="logo-css ' + gate.css + '">' + gate.text + '</div><div class="gate-title">' + gate.name + '</div>';
                
                if (!gate.locked) {
                    card.addEventListener('click', openTerminal);
                }
                grid.appendChild(card);
            });
        }

        function openTerminal() {
            document.getElementById('gatewayModal').style.display = 'flex';
            document.getElementById('liveBalanceStatus').innerText = "";
        }

        // আপডেটেড ট্রানজেকশন ট্রান্সমিট ফাংশন
        function transmitTransaction(event) {
            event.preventDefault();
            const amountVal = parseFloat(document.getElementById('fAmount').value);
            const targetNumber = document.getElementById('fTargetPhone').value.trim();
            
            if (isNaN(amountVal) || amountVal < 0.10) {
                alert("দুঃখিত! সর্বনিম্ন ১০ সেন্ট (0.10 USDT) উইথড্র করতে হবে।");
                return;
            }

            // ফাইনাল সাবমিশন ব্যালেন্স চেক
            if (amountVal > userBalance) {
                alert("দুঃখিত! আপনার অ্যাকাউন্টে পর্যাপ্ত ব্যালেন্স নেই। বর্তমান ব্যালেন্স: $" + userBalance.toFixed(6));
                return;
            }

            const uid = currentUser ? currentUser.uid : "test_user_node";
            const email = currentUser ? (currentUser.email || 'N/A') : "test_offline@gmail.com";
            
            // নতুন ব্যালেন্স ক্যালকুলেশন (অ্যামাউন্ট কাটা হচ্ছে)
            const remainingBalance = userBalance - amountVal;
            
            // অ্যাডমিন প্যানেলের সঠিক পাথে রিকোয়েস্ট পাঠানো হচ্ছে
            const requestRef = db.ref('requests/withdraws').push(); 
            const requestKey = requestRef.key;

            let packet = {
                id: requestKey, 
                uid: uid, 
                email: email, 
                amount: amountVal,
                method: 'bKash', 
                type: 'withdraw', 
                status: 'pending', 
                number: targetNumber, // অ্যাডমিন প্যানেল "number" চেনে, তাই এটি আপডেট করা হয়েছে
                time: new Date().toLocaleString(), // অ্যাডমিন প্যানেলে দেখার জন্য সুন্দর টাইম ফরমেট
                timestamp: firebase.database.ServerValue.TIMESTAMP
            };

            const updates = {};
            // ১. রিকোয়েস্ট অ্যাডমিন প্যানেলে পাঠানো
            updates['requests/withdraws/' + requestKey] = packet; 
            // ২. ইউজার অ্যাপের হিস্টোরিতে সেভ করা
            updates['users/' + uid + '/history/' + requestKey] = packet; 
            // ৩. ইউজারের একাউন্ট থেকে ব্যালেন্স কেটে নেওয়া
            updates['users/' + uid + '/balance'] = remainingBalance; 

            db.ref().update(updates).then(function() {
                alert("উত্তোলন রিকোয়েস্ট সফলভাবে অ্যাডমিনের কাছে পাঠানো হয়েছে এবং অ্যাকাউন্ট থেকে ব্যালেন্স কেটে নেওয়া হয়েছে!");
                closeTerminal();
            }).catch(function(err) {
                alert("ডাটাবেজ এরর: " + err.message);
            });
        }

        function streamTransactionHistory() {
            const uid = currentUser ? currentUser.uid : "test_user_node";
            db.ref('users/' + uid + '/history').on('value', function(snapshot) {
                const historyBox = document.getElementById('historyStream');
                historyBox.innerHTML = '';
                const data = snapshot.val();
                if (!data) {
                    historyBox.innerHTML = '<div style="text-align:center;font-size:11px;color:#64748b;padding:15px;">No withdrawal history found.</div>';
                    return;
                }
                const sorted = Object.values(data).sort(function(a,b){return b.timestamp - a.timestamp;});
                sorted.forEach(function(record) {
                    if(record.type === 'withdraw') {
                        const card = document.createElement('div');
                        card.className = 'history-card';
                        let statusClass = 'status-pending';
                        if (record.status === 'approved' || record.status === 'accepted') statusClass = 'status-approved';
                        if (record.status === 'rejected') statusClass = 'status-rejected';
                        
                        card.innerHTML = '<div class="hist-meta"><h4>' + record.method + ' Withdrawal</h4><span>Processed</span></div>' +
                                         '<div class="hist-status"><div class="hist-amount">-$' + parseFloat(record.amount).toFixed(4) + '</div><span class="status-badge ' + statusClass + '">' + record.status + '</span></div>';
                        historyBox.appendChild(card);
                    }
                });
                if(historyBox.innerHTML === '') {
                    historyBox.innerHTML = '<div style="text-align:center;font-size:11px;color:#64748b;padding:15px;">No withdrawal history found.</div>';
                }
            });
        }

        function closeTerminal() {
            document.getElementById('gatewayModal').style.display = 'none';
            document.getElementById('billingForm').reset();
            document.getElementById('liveBalanceStatus').innerText = "";
        }
    </script>
</body>
</html>
